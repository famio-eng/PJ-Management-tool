<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pj Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- MSAL.js: Phase2 M365連携は一時断念中。再開時は下行を有効化すること -->
<!-- <script src="https://alcdn.msauth.net/browser/3.27.0/js/msal-browser.min.js"></script> -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;font-size:13px;background:#f0f2f5;display:flex;height:100vh;overflow:hidden;color:#333}
/* Sidebar */
#sidebar{width:210px;background:#1a3a5c;color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:14px 16px;font-size:14px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.2);letter-spacing:.5px}
.sidebar-info{padding:10px 16px;font-size:11px;color:rgba(255,255,255,.7);border-bottom:1px solid rgba(255,255,255,.15);line-height:1.7}
#sidebar nav a{display:flex;align-items:center;gap:8px;padding:11px 16px;color:rgba(255,255,255,.82);text-decoration:none;cursor:pointer;transition:background .15s;font-size:12px}
#sidebar nav a:hover,#sidebar nav a.active{background:rgba(255,255,255,.15);color:#fff}
.sidebar-footer{margin-top:auto;padding:12px}
/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{background:#fff;border-bottom:1px solid #ddd;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#topbar h1{font-size:15px;font-weight:600;color:#1a3a5c}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.topbar-right label{font-size:11px;color:#666}
#content{flex:1;overflow-y:auto;padding:16px}
/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi-card{background:#fff;border-radius:8px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #ccc}
.kpi-card .kpi-label{font-size:11px;color:#888;margin-bottom:6px}
.kpi-card .kpi-val{font-size:30px;font-weight:700}
.kpi-card.ongoing{border-color:#00B050}.kpi-card.ongoing .kpi-val{color:#00B050}
.kpi-card.delay{border-color:#FF0000}.kpi-card.delay .kpi-val{color:#FF0000}
.kpi-card.close{border-color:#0070C0}.kpi-card.close .kpi-val{color:#0070C0}
.kpi-card.nactive{border-color:#808080}.kpi-card.nactive .kpi-val{color:#808080}
/* Status badges */
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:600;white-space:nowrap}
.s-ongoing{color:#00B050;background:#E2EFDA}.s-delay{color:#FF0000;background:#FFE0E0}
.s-close{color:#0070C0;background:#DDEEFF}.s-nactive{color:#808080;background:#F2F2F2}
.s-disable{color:#BFBFBF;background:#F2F2F2}
/* Sections */
.section{background:#fff;border-radius:8px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.section h2{font-size:13px;font-weight:600;margin-bottom:10px;color:#1a3a5c;border-left:3px solid #1a3a5c;padding-left:8px;display:flex;align-items:center;justify-content:space-between}
/* Tables */
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f5f7fa;padding:7px 6px;text-align:left;font-weight:600;border-bottom:2px solid #e0e0e0;white-space:nowrap;font-size:11px;color:#555}
td{padding:6px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:hover td{background:#fafbff}
.cp-badge{background:#e53935;color:#fff;font-size:9px;padding:1px 4px;border-radius:2px;margin-left:3px;vertical-align:middle}
/* Indent */
.il1{padding-left:0;font-weight:700;font-size:12px}
.il2{padding-left:14px;font-weight:600}
.il3{padding-left:28px}
.il4{padding-left:42px}
/* Buttons */
.btn{padding:5px 13px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:#1a3a5c;color:#fff}
.btn-secondary{background:#4472C4;color:#fff}
.btn-success{background:#00B050;color:#fff}
.btn-danger{background:#e53935;color:#fff}
.btn-outline{background:#fff;border:1px solid #ccc;color:#333}
.btn-sm{padding:3px 8px;font-size:11px}
/* NW Graph */
#nw-wrap{display:flex;flex-direction:column;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
#nw-svg-container{flex:1;min-height:520px;position:relative;overflow:hidden;cursor:grab;background:#f8f9fc}
#nw-svg-container:active{cursor:grabbing}
#nw-svg{width:100%;height:100%}
#nw-panel{border-top:1px solid #e0e0e0;padding:8px 14px;overflow-y:auto;font-size:12px;background:#fff;max-height:190px}
#nw-panel h3{font-size:12px;font-weight:600;margin-bottom:6px;color:#1a3a5c}
.nw-detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px 10px}
.nw-detail-cell{font-size:11px}
.nw-detail-cell .nw-detail-label{display:block;color:#888;margin-bottom:1px}
.nw-detail-cell .nw-detail-val{font-weight:500}
.nw-detail-row{display:flex;margin-bottom:6px;gap:6px}
.nw-detail-label{width:80px;font-size:11px;color:#888;flex-shrink:0}
.nw-detail-val{flex:1;font-weight:500}
.nw-controls{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
/* Timeline */
.tl-controls{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
#tl-outer{display:flex;overflow:hidden}
#tl-labels{flex:0 0 188px;overflow:hidden;position:relative;z-index:5}
#tl-chart{flex:1;overflow-x:auto;min-width:0}
.tl-label-bg{fill:#fff}
body.dark .tl-label-bg{fill:#16213e}
.tl-label-sep{stroke:#ddd;stroke-width:1}
body.dark .tl-label-sep{stroke:#2a3a5c}
/* Gantt split layout */
#gantt-wrap{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
#gantt-divider{width:5px;flex-shrink:0;background:#c8d0e0;cursor:col-resize;transition:background .15s}
#gantt-divider:hover,#gantt-divider.resizing{background:#4472C4}
body.dark #gantt-divider{background:#3a3a5c}
body.dark #gantt-divider:hover,body.dark #gantt-divider.resizing{background:#4472C4}
.gantt-split-outer{display:flex;overflow:hidden}
.gantt-left{flex:0 0 auto;min-width:50px;max-height:calc(100vh - 140px);overflow-x:auto;overflow-y:hidden}
.gantt-left::-webkit-scrollbar{width:0;height:6px}
.gantt-left::-webkit-scrollbar-thumb{background:#c8d0e0;border-radius:3px}
.gantt-right{flex:1;max-height:calc(100vh - 140px);overflow:auto;min-width:80px;scrollbar-width:auto;scrollbar-color:#7a8fc0 #dde4f0}
.gantt-right::-webkit-scrollbar{width:12px;height:12px}
.gantt-right::-webkit-scrollbar-track{background:#dde4f0}
.gantt-right::-webkit-scrollbar-thumb{background:#7a8fc0;border-radius:6px}
.gantt-right::-webkit-scrollbar-corner{background:#dde4f0}
/* Fixed columns table */
.gantt-fixed-tbl{border-collapse:collapse;font-size:11px;table-layout:fixed;border-right:none}
.gantt-fixed-tbl th,.gantt-fixed-tbl td{border:1px solid #e8e8e8;padding:0;overflow:hidden}
.gantt-fixed-tbl thead th{background:#f5f7fa;font-weight:600;font-size:10px;padding:4px 5px;height:52px;white-space:nowrap;position:sticky;top:0;z-index:3;vertical-align:middle;text-align:left}
.gantt-fixed-tbl tbody td{height:26px;padding:3px 5px;white-space:nowrap;vertical-align:middle;box-sizing:border-box}
/* Calendar table */
.gantt-cal-tbl{border-collapse:collapse;font-size:11px;table-layout:fixed}
.gantt-cal-tbl th,.gantt-cal-tbl td{border:1px solid #e8e8e8;padding:0}
.gantt-cal-tbl .gt-header{background:#f5f7fa;font-weight:600;font-size:10px;text-align:center;padding:2px;height:26px;width:22px;box-sizing:border-box}
.gantt-cal-tbl .gt-month{background:#e8edf5;font-weight:700;font-size:10px;text-align:center;color:#1a3a5c;padding:4px 2px;height:26px;position:sticky;top:0;z-index:3}
.gantt-cal-tbl .gt-header{position:sticky;top:26px;z-index:3}
.gantt-bar-cell{width:22px;padding:0;position:relative;height:26px;box-sizing:border-box}
.gantt-bar-base{position:absolute;height:14px;top:6px;border-radius:2px;background:#4472C4;opacity:.6}
.gantt-bar-actual{position:absolute;height:14px;top:6px;border-radius:2px;background:#00B050;opacity:.85}
.today-col{background:#FFF3E0 !important}
.cp-row td:first-child{border-left:3px solid #e53935}
.gantt-controls{display:flex;gap:8px;padding:10px;border-bottom:1px solid #eee;align-items:center}
.collapsed-children{display:none}
/* Meeting */
.mtg-section{margin-bottom:14px}
.mtg-section-title{font-size:12px;font-weight:600;padding:7px 10px;border-radius:4px;margin-bottom:8px}
.mtg-delay{background:#FFEBEE;color:#C62828}
.mtg-upcoming-start{background:#FFF8E1;color:#E65100}
.mtg-upcoming-end{background:#E8F5E9;color:#1B5E20}
.mtg-cp{background:#FFEBEE;color:#C62828}
textarea.comment-input{border:1px solid #ddd;border-radius:3px;padding:3px 5px;font-size:11px;width:140px;resize:none;height:38px;font-family:inherit}
textarea.comment-input.saved{background:#E8F5E9;border-color:#A5D6A7}
/* Actions */
.action-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.action-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:#f9f9f9;border-radius:6px;border-left:3px solid #ccc}
.action-item.high{border-color:#e53935}
.action-item.mid{border-color:#FB8C00}
.action-item.low{border-color:#43A047}
.action-item.done-item{opacity:.5}
.action-content{flex:1;font-size:12px}
.action-meta{font-size:10px;color:#888;margin-top:2px}
/* Dept */
.dept-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.dept-tab{padding:5px 10px;border:1px solid #ccc;border-radius:4px;cursor:pointer;background:#f5f5f5;font-size:11px;font-weight:500;transition:all .15s}
.dept-tab.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.dept-tab:hover:not(.active){background:#e8edf5}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:8px;padding:22px;width:440px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal h3{margin-bottom:14px;font-size:14px;color:#1a3a5c}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:11px;margin-bottom:3px;color:#666;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;border:1px solid #ccc;border-radius:4px;padding:5px 8px;font-size:12px;font-family:inherit}
.form-row textarea{resize:vertical;min-height:56px}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
/* Tooltip */
.tooltip{position:fixed;background:rgba(20,20,30,.88);color:#fff;padding:7px 11px;border-radius:5px;font-size:11px;pointer-events:none;z-index:9999;display:none;max-width:280px;line-height:1.6}
/* File drop */
.file-area{text-align:center;padding:16px;background:#f9f9f9;border:2px dashed #ccc;border-radius:8px;margin-bottom:12px;font-size:12px;color:#888}
/* NW node */
.nw-node{cursor:pointer}
/* Misc */
.nw-icon{cursor:pointer;color:#4472C4;font-size:13px;display:inline-block;transition:transform .1s}
.nw-icon:hover{transform:scale(1.3);color:#1a3a5c}
.flex-row{display:flex;align-items:center;gap:8px}
.text-muted{color:#888;font-size:11px}
.pct-bar{display:inline-block;width:50px;height:6px;background:#e0e0e0;border-radius:3px;vertical-align:middle;margin-right:4px;position:relative;overflow:hidden}
.pct-fill{position:absolute;left:0;top:0;height:100%;background:#4472C4;border-radius:3px}
/* Print */
@media print{
  #sidebar,#topbar .topbar-right,.btn,.nw-controls,.tl-controls,.gantt-controls,.dept-tabs,.modal-overlay{display:none!important}
  body{overflow:visible}
  #main{overflow:visible}
  #content{overflow:visible;padding:0}
  .section,.kpi-card{box-shadow:none;border:1px solid #ddd}
  page{size:A3 landscape}
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f1f1f1}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
/* ===== DARK MODE ===== */
body.dark{background:#1a1a2e;color:#e0e0e0}
body.dark #sidebar{background:#0d1f3c}
body.dark .sidebar-info{color:rgba(200,210,230,.8);border-color:rgba(255,255,255,.1)}
body.dark #topbar{background:#16213e;border-color:#3a3a5c}
body.dark #topbar h1{color:#90b8e0}
body.dark .topbar-right label{color:#aaa}
body.dark .topbar-right input[type="date"]{background:#1a1a2e;border-color:#3a3a5c;color:#e0e0e0}
body.dark #content{background:transparent}
body.dark .section{background:#16213e;box-shadow:0 1px 3px rgba(0,0,0,.3)}
body.dark .kpi-card{background:#16213e;box-shadow:0 1px 3px rgba(0,0,0,.3)}
body.dark .kpi-card.ongoing{border-color:#4CAF50}.body.dark .kpi-card.ongoing .kpi-val{color:#4CAF50}
body.dark th{background:#1e2a45;color:#b0bec5;border-color:#3a3a5c}
body.dark td{border-color:#2a2a4a;color:#d0d8e8}
body.dark tr:hover td{background:#1e2a45}
body.dark .modal{background:#16213e;color:#e0e0e0}
body.dark .modal h3{color:#90b8e0}
body.dark .form-row input,body.dark .form-row select,body.dark .form-row textarea{background:#1a1a2e;border-color:#3a3a5c;color:#e0e0e0}
body.dark .btn-outline{background:#16213e;border-color:#3a3a5c;color:#ccc}
body.dark .btn-outline:hover{background:#1e2a45}
body.dark .dept-tab{background:#1e2a45;border-color:#3a3a5c;color:#ccc}
body.dark .dept-tab.active{background:#1a3a5c;border-color:#1a3a5c}
body.dark .dept-tab:hover:not(.active){background:#243555}
body.dark .action-item{background:#1e2a45}
body.dark .action-meta{color:#7a8a9a}
body.dark .file-area{background:#1e2a45;border-color:#3a3a5c;color:#888}
body.dark #nw-panel{background:#16213e;border-color:#3a3a5c}
body.dark #nw-svg-container{background:#1a1a2e}
body.dark .nw-detail-label{color:#7a8a9a}
body.dark .nw-detail-cell .nw-detail-label{color:#7a8a9a}
body.dark .gantt-fixed-tbl th,.dark .gantt-cal-tbl th{background:#1e2a45;border-color:#3a3a5c}
body.dark .gantt-fixed-tbl td,.dark .gantt-cal-tbl td{border-color:#2a2a4a}
body.dark .gantt-controls{border-color:#3a3a5c}
body.dark .gantt-left{border-color:#3a3a5c}
body.dark .gt-month{background:#243555;color:#90b8e0}
body.dark .gt-header{background:#1e2a45;color:#b0bec5}
body.dark textarea.comment-input{background:#1a1a2e;border-color:#3a3a5c;color:#e0e0e0}
body.dark .text-muted{color:#7a8a9a}
body.dark .mtg-delay{background:#3d1515;color:#ef9a9a}
body.dark .mtg-upcoming-start{background:#3d2e00;color:#ffcc80}
body.dark .mtg-upcoming-end{background:#1b3320;color:#a5d6a7}
body.dark .mtg-cp{background:#3d1515;color:#ef9a9a}
body.dark .sidebar-footer .btn-outline{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}
/* Night mode toggle */
#night-toggle{background:none;border:1px solid #ccc;border-radius:20px;padding:3px 8px;cursor:pointer;font-size:15px;transition:all .2s;line-height:1}
#night-toggle:hover{background:rgba(0,0,0,.08)}
body.dark #night-toggle{border-color:#3a3a5c;color:#e0e0e0}
body.dark #night-toggle:hover{background:rgba(255,255,255,.1)}
/* M365 Auth UI */
#auth-area{display:flex;align-items:center;gap:6px}
#auth-user-display{font-size:11px;color:#1a3a5c;background:#e8edf5;border-radius:12px;padding:3px 9px;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
body.dark #auth-user-display{background:#243555;color:#90b8e0}
#auth-btn{white-space:nowrap}
.todo-push-indicator{font-size:10px;color:#00B050;margin-left:4px;animation:fadeIn .3s}
/* Column resize handle */
.col-resizer{position:absolute;right:0;top:0;width:5px;height:100%;cursor:col-resize;user-select:none;z-index:2}
.col-resizer:hover,.col-resizer.resizing{background:rgba(68,114,196,.4)}
/* Column filter dropdown */
.col-filter-dropdown{position:fixed;background:#fff;border:1px solid #ccc;border-radius:6px;padding:8px;z-index:9999;max-height:240px;overflow-y:auto;box-shadow:0 4px 14px rgba(0,0,0,.18);min-width:160px;font-size:12px}
body.dark .col-filter-dropdown{background:#16213e;border-color:#3a3a5c;color:#e0e0e0}
.filter-btn{font-size:9px;margin-left:3px;cursor:pointer;color:#bbb;border:none;background:none;padding:1px 2px;vertical-align:middle}
.filter-btn.active{color:#4472C4;font-weight:700}
body.dark .filter-btn.active{color:#90b8e0}
/* Drag over for col reorder */
th.drag-over{background:#d0e4f7!important;outline:2px dashed #4472C4;outline-offset:-2px}
body.dark th.drag-over{background:#243555!important;outline-color:#90b8e0}
/* Gantt dark mode - class-based overrides */
.gantt-fixed-tbl .gantt-summary-row td{background:#f5f7fa}
body.dark .gantt-fixed-tbl .gantt-summary-row td{background:#1a2535!important}
body.dark .gantt-cal-tbl .today-bg{background:#2c2010!important}
body.dark .gantt-fixed-tbl tbody td{color:#d0d8e8}
body.dark #gantt-wrap,.dark .gantt-left,.dark .gantt-right{background:#16213e}
body.dark .gantt-right{scrollbar-color:#4a5a8a #1a2540}
body.dark .gantt-right::-webkit-scrollbar-track{background:#1a2540}
body.dark .gantt-right::-webkit-scrollbar-thumb{background:#4a5a8a}
body.dark .gantt-table td { background: #16213e; }
/* Section headings in dark mode */
body.dark .section h2 { color: #90b8e0; border-left-color: #4472C4; }
/* Timeline SVG container - transparent so section dark bg shows through */
body.dark #tl-labels { background: #16213e; }
body.dark #tl-chart  { background: transparent; }
/* Timeline SVG CSS classes for dark mode */
.tl-gridline { stroke: #e0e0e0; stroke-width: 1; }
body.dark .tl-gridline { stroke: #3a3a5c; }
.tl-month-text { fill: #666; }
body.dark .tl-month-text { fill: #7a8a9a; }
.tl-row-even { fill: #fafbff; opacity: .5; }
body.dark .tl-row-even { fill: #1e2a45; opacity: .5; }
.tl-row-odd { fill: #fff; opacity: .5; }
body.dark .tl-row-odd { fill: #16213e; opacity: .5; }
.tl-task-text { fill: #333; }
body.dark .tl-task-text { fill: #d0d8e8; }
/* Task list panel row backgrounds (dark mode) */
#tl-task-list tr.tl-list-l1 { background: #f0f4fa; }
#tl-task-list tr.tl-list-l2 { background: #f8faff; }
body.dark #tl-task-list tr.tl-list-l1 { background: #1a2a45; }
body.dark #tl-task-list tr.tl-list-l2 { background: #16223a; }
body.dark #tl-task-list thead tr { background: #1e2d50 !important; }
body.dark #tl-task-list td, body.dark #tl-task-list th { color: #c8d4e8; border-color: #243050; }
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div id="sidebar">
  <div class="sidebar-logo">📊 PJ進捗管理</div>
  <div class="sidebar-info">
    <div id="sb-pj-name" style="font-weight:600;color:#fff;margin-bottom:2px">医療機器開発PJ-A</div>
    <div>次回定例予定日: <span id="sb-report-date">2026-05-18</span></div>
  </div>
  <nav id="sidebar-nav">
    <a data-screen="dashboard" class="active">🏠 ダッシュボード</a>
    <a data-screen="timeline">📅 大日程タイムライン</a>
    <a data-screen="nw">🔗 NW図</a>
    <a data-screen="gantt">📋 ガントチャート（WBS）</a>
    <a data-screen="meeting">📝 定例ビュー</a>
    <a data-screen="dept">👥 機能別進捗報告</a>
  </nav>
  <div class="sidebar-footer">

const M365_CONFIG = {

const _msalInstance = (() => {
  if (typeof msal === 'undefined') return null;
  return new msal.PublicClientApplication({
    auth: {
      clientId:    M365_CONFIG.clientId,
      authority:   `https://login.microsoftonline.com/${M365_CONFIG.tenantId}`,
      redirectUri: window.location.href.split('?')[0].split('#')[0],
    },
    cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false },
  });
})();

const _GRAPH_SCOPES = ['User.Read', 'Tasks.ReadWrite'];
let _msalAccount = null;

function initMsal() {
  if (!_msalInstance) return;
  const accounts = _msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    _msalAccount = accounts[0];
    _onSignedIn(_msalAccount);
  }
}

window.msalSignIn = async function() {
  if (!_msalInstance) {
    alert('MSAL が初期化されていません。\nclientId / tenantId を設定してください。');
    return;
  }
  if (M365_CONFIG.clientId === 'YOUR_CLIENT_ID') {
    alert('clientId / tenantId がプレースホルダーのままです。\nindex.html の M365_CONFIG を編集してください。');
    return;
  }
  try {
    const result = await _msalInstance.loginPopup({ scopes: _GRAPH_SCOPES });
    _msalAccount = result.account;
    _onSignedIn(_msalAccount);
  } catch(e) {
    console.error('M365 sign-in error', e);
  }
};

window.msalSignOut = async function() {
  if (!_msalInstance || !_msalAccount) return;
  try {
    await _msalInstance.logoutPopup({ account: _msalAccount });
  } catch(_) {}
  _msalAccount = null;
  _onSignedOut();
};

function _onSignedIn(account) {
  state.msalUser = { name: account.name, username: account.username };
  _updateAuthUI();
  if (state.currentScreen === 'dept') renderDept();
}

function _onSignedOut() {
  state.msalUser = null;
  _updateAuthUI();
  if (state.currentScreen === 'dept') renderDept();
}

function _updateAuthUI() {
  const btn     = document.getElementById('auth-btn');
  const display = document.getElementById('auth-user-display');
  if (!btn || !display) return;
  if (_msalAccount) {
    display.textContent = '👤 ' + (_msalAccount.name || _msalAccount.username);
    display.style.display = 'inline';
    btn.textContent = 'サインアウト';
    btn.onclick = window.msalSignOut;
  } else {
    display.style.display = 'none';
    btn.textContent = '🔐 M365ログイン';
    btn.onclick = window.msalSignIn;
  }
}

async function _getGraphToken() {
  if (!_msalInstance || !_msalAccount) return null;
  try {
    const r = await _msalInstance.acquireTokenSilent({
      scopes: _GRAPH_SCOPES,
      account: _msalAccount,
    });
    return r.accessToken;
  } catch(_) {
    try {
      const r = await _msalInstance.acquireTokenPopup({ scopes: _GRAPH_SCOPES });
      _msalAccount = r.account;
      return r.accessToken;
    } catch(e2) {
      console.error('Token acquisition failed', e2);
      return null;
    }
  }
}

// Microsoft ToDo にアクションタスクをプッシュ
async function pushActionToToDo(action) {
  const token = await _getGraphToken();
  if (!token) return;

  const listId = await _getOrCreateToDoList(token, M365_CONFIG.todoListName);
  if (!listId) { console.error('ToDo list not found/created'); return; }

  const body = {
    title: action.content,
    importance: action.priority === '高' ? 'high' : action.priority === '低' ? 'low' : 'normal',
    body: {
      contentType: 'text',
      content: `担当: ${action.owner || '—'}\n作成日時: ${action.createdAt}`,
    },
  };
  if (action.deadline) {
    body.dueDateTime = { dateTime: action.deadline + 'T00:00:00', timeZone: 'Asia/Tokyo' };
  }

  try {
    const resp = await fetch(
      `https://graph.microsoft.com/v1.0/me/todo/lists/${listId}/tasks`,
      {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(body),
      }
    );
    if (!resp.ok) throw new Error(await resp.text());
  } catch(e) {
    console.error('ToDo push failed', e);
  }
}

async function _getOrCreateToDoList(token, listName) {
  try {
    const resp = await fetch('https://graph.microsoft.com/v1.0/me/todo/lists', {
      headers: { 'Authorization': 'Bearer ' + token },
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    const found = (data.value || []).find(l => l.displayName === listName);
    if (found) return found.id;

    const create = await fetch('https://graph.microsoft.com/v1.0/me/todo/lists', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ displayName: listName }),
    });
    if (!create.ok) return null;
    const created = await create.json();
    return created.id;
  } catch(e) {
    console.error('ToDo list fetch/create failed', e);
    return null;
  }
}

// =====================================================================
// STATUS ENGINE (MSP計算式の完全再現)
// =====================================================================
// Excelエクスポートの日付文字列を Date に変換
// 対応形式: "2024年04月15日 8:00" / "2024/04/15" / Date オブジェクト / "N/A" → null
function parseExcelDate(val) {
  if (val == null || val === '' || val === 'N/A') return null;
  // SheetJS cellDates:true で既に Date オブジェクトになっている場合
  if (val instanceof Date) return isNaN(val) ? null : val;
  // 数値の場合は Excel シリアル日付として変換
  if (typeof val === 'number') {
    // Excel シリアル（1900年1月1日起点、うるう年バグ補正）
    const d = new Date(Math.round((val - 25569) * 86400000));
    return isNaN(d) ? null : d;
  }
  const s = String(val).trim();
  if (!s || s === 'N/A') return null;
  // "2024年04月15日 8:00" 形式
  const mJP = s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (mJP) return new Date(parseInt(mJP[1]), parseInt(mJP[2]) - 1, parseInt(mJP[3]));
  // "2024/04/15" または "2024/4/15" 形式（年月日を分解してローカル時刻で生成）
  const mSlash = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if (mSlash) return new Date(parseInt(mSlash[1]), parseInt(mSlash[2]) - 1, parseInt(mSlash[3]));
  // "2024-04-15" 形式（同上）
  const mDash = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (mDash) return new Date(parseInt(mDash[1]), parseInt(mDash[2]) - 1, parseInt(mDash[3]));
  return null;
}

function toDate(s) {
  if (!s) return null;
  if (s instanceof Date) return isNaN(s) ? null : s;
  return parseExcelDate(s);
}

function formatDate(d, fallback) {
  if (fallback === undefined) fallback = '—';
  const dt = (d instanceof Date) ? d : toDate(d);
  if (!dt) return fallback;
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const day = String(dt.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function daysBetween(a, b) {
  if (!a || !b) return 0;
  return Math.round((b - a) / 86400000);
}

function isZeroDays(remain) {
  if (!remain) return false;
  return remain.trim() === '0 days' || remain.trim() === '0 d' || remain.trim() === '0';
}

function calcStatus(task, allTasks, reportDate) {
  const rd = toDate(reportDate);
  if (!rd) return 'nActive';

  if (task.active === 'いいえ') return 'Disable';

  if (task.isSummary) {
    const astart = toDate(task.astart);
    const bstart = toDate(task.bstart);
    if (!astart && bstart && rd < bstart) return 'nActive';
    // Check children for Delay
    const children = allTasks.filter(t => {
      if (t.id === task.id || !t.wbs || !task.wbs) return false;
      return t.wbs.startsWith(task.wbs + '.') && !t.wbs.slice(task.wbs.length + 1).includes('.');
    });
    const childStatuses = children.map(c => calcStatus(c, allTasks, reportDate));
    if (childStatuses.some(s => s === 'Delay')) return 'Delay';
    if (task.pct >= 100 && isZeroDays(task.remain)) return 'Close';
    return 'On-going';
  } else {
    const bstart = toDate(task.bstart);
    const bend = toDate(task.bend);
    if (bstart && rd < bstart) return 'nActive';
    if (task.pct >= 100) return 'Close';
    if (bend && rd > bend) return 'Delay';
    if (bstart && bend) {
      const total = daysBetween(bstart, bend);
      if (total > 0) {
        const elapsed = daysBetween(bstart, rd);
        const expected = Math.floor((elapsed / total) * 100);
        if (task.pct >= expected) return 'On-going';
        return 'Delay';
      }
    }
    return 'On-going';
  }
}

function computeAllStatuses() {
  state.tasks.forEach(t => {
    t.status = calcStatus(t, state.tasks, state.reportDate);
  });
}

function statusBadge(s) {
  const cls = {
    'On-going':'s-ongoing','Delay':'s-delay','Close':'s-close',
    'nActive':'s-nactive','Disable':'s-disable'
  }[s] || 's-nactive';
  return `<span class="badge ${cls}">${s}</span>`;
}

function pctBar(pct) {
  return `<span class="pct-bar"><span class="pct-fill" style="width:${pct}%"></span></span>${pct}%`;
}

document.getElementById('excel-file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    // --- フェーズ1: XLSX パース ---
    let wb, ws, rows;
    try {
      wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
    } catch(err) {
      alert('XLSXファイルの解析に失敗しました（ファイル形式を確認してください）:\n' + err.message);
      return;
    }

    // --- フェーズ2: シート取得・JSON変換 ---
    try {
      ws = wb.Sheets[wb.SheetNames[0]];
      if (!ws) throw new Error('シートが見つかりません。シート名: ' + wb.SheetNames.join(', '));
      // raw:true + cellDates:true でネイティブ型（Date・数値・文字列）を取得
      rows = XLSX.utils.sheet_to_json(ws, {raw:true, defval:null});
      if (rows.length === 0) throw new Error('シートにデータが1行もありません');
    } catch(err) {
      alert('シートの読み込みに失敗しました:\n' + err.message);
      return;
    }

    // --- フェーズ3: 列名の確認（デバッグ用ログ） ---
    const actualCols = Object.keys(rows[0] || {});
    console.log('[Excel import] 実際の列名:', actualCols);
    console.log('[Excel import] シート名:', wb.SheetNames[0], '/ 行数:', rows.length);

    // 列名の表記ゆれに対応するエイリアス（実際の列名 → 正規化後の列名）
    const colAlias = {
      // WBS番号
      'WBS番号': 'WBS_番号', 'WBS_No': 'WBS_番号', 'WBS No': 'WBS_番号',
      // アウトラインレベル
      'アウトラインレベル': 'アウトライン_レベル', 'アウトライン レベル': 'アウトライン_レベル',
      'アウトライン_レベル': 'アウトライン_レベル',
      // アウトラインフィールド
      'アウトラインフィールド': 'アウトラインフィールド',
      'アウトライン_フィールド': 'アウトラインフィールド',
      'アウトライン フィールド': 'アウトラインフィールド',
      // 先行タスク
      '先行タスク': '先行タスク', '先行 タスク': '先行タスク',
    };

    // 行データのキーをエイリアス解決した形に正規化する関数
    function normalizeRow(row) {
      const out = {};
      Object.entries(row).forEach(([k, v]) => {
        const normalized = colAlias[k] || k;
        out[normalized] = v;
      });
      return out;
    }

    // --- フェーズ4: データ変換 ---
    try {
      const colMap = {
        'ID':'id','WBS_番号':'wbs','アウトライン_レベル':'level','タスク名':'name',
        'Note':'note','期間':'duration','開始日':'start','終了日':'end',
        '基準開始日':'bstart','基準終了日':'bend','実績開始日':'astart','実績終了日':'aend',
        '残存期間':'remain','先行タスク':'pred','リソース名':'resource','達成率':'pct',
        'クリティカル':'critical','アクティブ':'active','アウトラインフィールド':'isSummaryRaw'
      };
      const DATE_FIELDS = ['start','end','bstart','bend','astart','aend'];
      // raw:true で数値になりうるが、アプリ側で文字列として扱うフィールド
      const STR_FIELDS  = ['wbs','name','note','duration','remain','pred','resource',
                           'critical','active','isSummaryRaw'];

      state.tasks = rows.map((rawRow, i) => {
        const row = normalizeRow(rawRow);
        const t = {};
        Object.entries(colMap).forEach(([jp, en]) => {
          t[en] = row[jp] !== undefined ? row[jp] : (en === 'isSummaryRaw' ? '' : null);
        });

        // 数値・その他型 → 文字列に正規化（.startsWith/.split 等を安全に呼ぶため）
        STR_FIELDS.forEach(f => {
          if (t[f] == null || t[f] === '') { t[f] = f === 'isSummaryRaw' ? '' : null; return; }
          if (t[f] instanceof Date) { t[f] = null; return; } // 誤判定されたDate → null
          t[f] = String(t[f]).trim() || null;
        });
        // pred が null の場合は空文字にしておく（後続で !t.pred チェックが効く）
        if (t.pred == null) t.pred = '';

        t.id = parseInt(t.id) || (i + 1);
        t.level = parseInt(t.level) || 1;

        // 達成率: raw:true で 0〜1 小数 or 整数で来る → 0〜100 整数に変換
        const pctRaw = t.pct;
        if (pctRaw instanceof Date || pctRaw == null) {
          t.pct = 0;
        } else {
          const rawPct = parseFloat(String(pctRaw).replace('%', '').trim());
          if (isNaN(rawPct)) {
            t.pct = 0;
          } else if (rawPct <= 1.0 && rawPct >= 0 && !String(pctRaw).includes('%')) {
            // 0〜1 の小数（%記号なし） → ×100
            t.pct = Math.round(rawPct * 100);
          } else {
            t.pct = Math.round(rawPct);
          }
        }

        // 日付列: Date / 文字列 / 数値シリアル → Date または null に変換
        DATE_FIELDS.forEach(f => { t[f] = parseExcelDate(t[f]); });

        t.isSummary = t.isSummaryRaw === 'はい' || t.level === 1;
        return t;
      }).filter(t => t.name); // タスク名がない空行を除去
    } catch(err) {
      console.error('Excel data transform error:', err);
      alert('データの変換中にエラーが発生しました:\n' + err.message + '\n\n' + (err.stack || ''));
      return;
    }

    // --- フェーズ5: ステータス計算・描画 ---
    try {
      computeAllStatuses();
      renderScreen();
      console.log('[Excel import] 完了。タスク数:', state.tasks.length);
    } catch(err) {
      console.error('Render error after Excel import:', err);
      // alert より選択・コピーしやすいページ内エラー表示
      const msg = err.message + '\n' + (err.stack || '');
      const box = document.createElement('div');
      box.style.cssText = 'position:fixed;top:10px;right:10px;z-index:9999;background:#fff3f3;border:2px solid #e53935;border-radius:8px;padding:16px;max-width:600px;max-height:80vh;overflow:auto;font-family:monospace;font-size:12px;white-space:pre-wrap;box-shadow:0 4px 16px rgba(0,0,0,0.3)';
      box.innerHTML = '<b style="color:#e53935">⚠ 描画エラー（選択してコピーしてください）</b>\n\n' + msg.replace(/</g,'&lt;');
      box.innerHTML += '\n\n<button onclick="this.parentNode.remove()" style="margin-top:8px;padding:4px 12px;cursor:pointer">閉じる</button>';
      document.body.appendChild(box);
    }
  };
  reader.readAsArrayBuffer(file);
  this.value = '';
});

// Build map: taskId → [directChildId, ...]
function buildChildrenMap() {
  const childrenOf = {};
  state.tasks.forEach(t => { childrenOf[t.id] = []; });
  const parentStack = []; // [{id, level}]
  state.tasks.forEach(t => {
    while (parentStack.length && parentStack[parentStack.length - 1].level >= t.level) {
      parentStack.pop();
    }
    if (parentStack.length) {
      childrenOf[parentStack[parentStack.length - 1].id].push(t.id);
    }
    parentStack.push({ id: t.id, level: t.level });
  });
  return childrenOf;
}

// Initialize tlSelectedIds (level1+2 + milestones) and tlExpandedIds (level1 summaries expanded)
function initTLSelection() {
  if (state.tlSelectedIds.size > 0) return;
  const childrenOf = buildChildrenMap();
  state.tasks.forEach(t => {
    if (t.active === 'いいえ') return;
    if (t.level <= 2 || t.duration === '0 days') {
      state.tlSelectedIds.add(t.id);
    }
  });
  // Expand all level-1 summaries so level-2 tasks appear below them by default
  state.tasks.forEach(t => {
    if (t.level === 1 && (childrenOf[t.id] || []).some(cid => state.tlSelectedIds.has(cid))) {
      state.tlExpandedIds.add(t.id);
    }
  });
}

// Build immediate-parent map: taskId → parentId (or null)
function buildParentMap() {
  const parentOf = {};
  const parentStack = [];
  state.tasks.forEach(t => {
    while (parentStack.length && parentStack[parentStack.length - 1].level >= t.level) {
      parentStack.pop();
    }
    parentOf[t.id] = parentStack.length ? parentStack[parentStack.length - 1].id : null;
    parentStack.push({ id: t.id, level: t.level });
  });
  return parentOf;
}

// Return array of row objects for drawTimeline()
function buildTLRows() {
  const childrenOf = buildChildrenMap();
  const parentOf = buildParentMap();

  // A task is visible if: selected AND (no selected parent OR parent is expanded)
  function isVisible(t) {
    if (!state.tlSelectedIds.has(t.id)) return false;
    const pid = parentOf[t.id];
    if (pid == null) return true;
    if (!state.tlSelectedIds.has(pid)) return true; // parent not selected → show independently
    return state.tlExpandedIds.has(pid);            // parent selected → only if expanded
  }

  const rows = [];
  state.tasks.forEach(t => {
    if (t.active === 'いいえ') return;
    if (!isVisible(t)) return;
    const hasSelectedChildren = (childrenOf[t.id] || []).some(cid => state.tlSelectedIds.has(cid));
    rows.push({
      id: t.id,
      name: t.name,
      bstart: toDate(t.bstart), bend: toDate(t.bend),
      astart: toDate(t.astart), aend: toDate(t.aend),
      isMilestone: t.duration === '0 days',
      status: t.status,
      level: t.level,
      resource: t.resource || '',
      source: 'auto',
      color: null,
      critical: t.critical === 'はい',
      isSummary: hasSelectedChildren,
      isExpanded: state.tlExpandedIds.has(t.id),
    });
  });

  // Manual items always shown
  state.timelineItems.forEach(m => {
    rows.push({
      id: m.id,
      name: m.name,
      bstart: toDate(m.date || m.start), bend: toDate(m.end || m.date),
      astart: null, aend: null,
      isMilestone: m.type === 'milestone',
      status: null, level: 3, resource: '',
      source: 'manual', color: m.color,
      isSummary: false, isExpanded: false,
    });
  });

  return rows;
}

      <td style="padding:3px 6px">${t.status || ''}</td>

  html += '</tbody></table>';

}

window.toggleTLTask = function(id, checked) {
  if (checked) state.tlSelectedIds.add(id);
  else { state.tlSelectedIds.delete(id); state.tlExpandedIds.delete(id); }
  saveStorage();
  // Update "all" checkbox state
  const allCb = document.getElementById('tl-chk-all');
  if (allCb) {
    const active = state.tasks.filter(t => t.active !== 'いいえ');
    allCb.checked = active.length > 0 && active.every(t => state.tlSelectedIds.has(t.id));
  }
  drawTimeline();
};

window.toggleAllTLTasks = function(checked) {
  state.tasks.forEach(t => {
    if (t.active === 'いいえ') return;

    else { state.tlSelectedIds.delete(t.id); state.tlExpandedIds.delete(t.id); }

  document.querySelectorAll('#tl-task-list input[data-tid]').forEach(cb => { cb.checked = checked; });

window.scrollTLToday = function() {
  const chartEl = document.getElementById('tl-chart');
  const meta = state._tlChartMeta;
  if (!chartEl || !meta) return;
  const { startDate, endDate, chartW } = meta;
  const rd = toDate(state.reportDate);
  const xScale = d3.scaleTime().domain([startDate, endDate]).range([0, chartW]);
  const todayX = xScale(rd);
  chartEl.scrollLeft = Math.max(0, todayX - chartEl.clientWidth / 3);
};

function drawTimeline() {
  const labelsEl = document.getElementById('tl-labels');
  const chartEl  = document.getElementById('tl-chart');
  if (!labelsEl || !chartEl) return;

  const rd = toDate(state.reportDate);

  // ── Compute date range from all active tasks ──────────────────────────
  let minD = null, maxD = null;
  state.tasks.filter(t => t.active !== 'いいえ').forEach(t => {
    const s = toDate(t.bstart), e = toDate(t.bend);
    if (s && (!minD || s < minD)) minD = s;
    if (e && (!maxD || e > maxD)) maxD = e;
  });
  state.timelineItems.forEach(m => {
    const s = toDate(m.date || m.start), e = toDate(m.end || m.date || m.start);
    if (s && (!minD || s < minD)) minD = s;
    if (e && (!maxD || e > maxD)) maxD = e;
  });
  if (!minD) minD = new Date(rd.getFullYear(), rd.getMonth() - 3, 1);
  if (!maxD) maxD = new Date(rd.getFullYear(), rd.getMonth() + 9, 1);

  const startDate = new Date(minD.getFullYear(), minD.getMonth() - 1, 1);
  const endDate   = new Date(maxD.getFullYear(), maxD.getMonth() + 2, 1);

  const PX_PER_MONTH = state.tlZoom || 65;
  const totalMonths  = (endDate.getFullYear() - startDate.getFullYear()) * 12
                     + (endDate.getMonth() - startDate.getMonth());
  const chartW = Math.max(totalMonths * PX_PER_MONTH, 400);
  state._tlChartMeta = { startDate, endDate, chartW };

  // ── Rows ──────────────────────────────────────────────────────────────
  const allRows = buildTLRows(); // selection-filtered, no date filter here

  const labelW = 188;
  const marginT = 44, marginB = 20;
  const rowH = 34;
  const H = marginT + allRows.length * rowH + marginB;

  const xScale = d3.scaleTime().domain([startDate, endDate]).range([0, chartW]);

  // ── Label SVG (fixed left column) ────────────────────────────────────
  const labelSvg = d3.select(labelsEl).selectAll('svg').data([1]).join('svg')
    .attr('width', labelW).attr('height', H);
  labelSvg.selectAll('*').remove();

  // header background
  labelSvg.append('rect').attr('x', 0).attr('y', 0).attr('width', labelW).attr('height', marginT)
    .attr('class', 'tl-label-bg');
  // separator line
  labelSvg.append('line').attr('x1', labelW - 1).attr('x2', labelW - 1)
    .attr('y1', 0).attr('y2', H).attr('class', 'tl-label-sep');

  allRows.forEach((row, i) => {
    const y = marginT + i * rowH;
    labelSvg.append('rect').attr('x', 0).attr('y', y).attr('width', labelW).attr('height', rowH)
      .attr('class', i % 2 === 0 ? 'tl-row-even' : 'tl-row-odd');

    const indent = row.level === 1 ? 4 : row.level === 2 ? 14 : 22;
    const label  = row.name.length > 22 ? row.name.slice(0, 21) + '…' : row.name;
    const icon   = row.isSummary ? (row.isExpanded ? '▼ ' : '▶ ') : '';
    const prefix = row.source === 'manual' ? '✏ ' : icon;

    const lbl = labelSvg.append('text')
      .attr('x', indent).attr('y', y + rowH / 2 + 4)
      .attr('font-size', row.level === 1 ? '12px' : '11px')
      .attr('font-weight', row.level <= 2 ? '600' : '400')
      .attr('class', 'tl-task-text')
      .text(prefix + label);
    if (row.isSummary && row.id != null)
      lbl.style('cursor', 'pointer').on('click', () => toggleTLExpand(row.id));
  });

  // ── Chart SVG (scrollable) ────────────────────────────────────────────
  const chartSvg = d3.select(chartEl).selectAll('svg').data([1]).join('svg')
    .attr('width', chartW + 6).attr('height', H);
  chartSvg.selectAll('*').remove();

  const g = chartSvg.append('g').attr('transform', `translate(0,${marginT})`);

  // header bg for chart area
  chartSvg.append('rect').attr('x', 0).attr('y', 0).attr('width', chartW + 6).attr('height', marginT)
    .attr('class', 'tl-label-bg');

  // Month gridlines + labels
  d3.timeMonths(startDate, endDate).forEach(m => {
    const x = xScale(m);
    g.append('line').attr('x1', x).attr('x2', x).attr('y1', -marginT).attr('y2', allRows.length * rowH)
      .attr('class', 'tl-gridline');
    g.append('text').attr('x', x + 4).attr('y', -14)
      .attr('font-size', '10px').attr('class', 'tl-month-text')
      .text(d3.timeFormat('%Y/%m')(m));
  });

  // TODAY line
  const tx = xScale(rd);
  if (tx >= 0 && tx <= chartW) {
    g.append('line').attr('x1', tx).attr('x2', tx).attr('y1', -marginT).attr('y2', allRows.length * rowH)
      .attr('stroke', 'orange').attr('stroke-width', 2).attr('stroke-dasharray', '4,3');
    g.append('text').attr('x', tx + 2).attr('y', -marginT + 12)
      .attr('font-size', '10px').attr('fill', 'orange').text('TODAY');
  }

  // Rows
  allRows.forEach((row, i) => {
    const y = i * rowH;
    const rowG = g.append('g').attr('transform', `translate(0,${y})`);

    rowG.append('rect').attr('x', 0).attr('y', 0).attr('width', chartW).attr('height', rowH)
      .attr('class', i % 2 === 0 ? 'tl-row-even' : 'tl-row-odd');

    if (row.isMilestone) {
      const mx = xScale(row.bstart);
      if (mx >= 0 && mx <= chartW) {
        const color = row.color || '#e53935';
        const d = 8;
        rowG.append('path')
          .attr('d', `M${mx},${rowH/2-d} L${mx+d},${rowH/2} L${mx},${rowH/2+d} L${mx-d},${rowH/2} Z`)
          .attr('fill', color).attr('stroke', color);
        rowG.append('text').attr('x', mx + d + 4).attr('y', rowH / 2 + 4)
          .attr('font-size', '10px').attr('fill', color).attr('font-weight', '600')
          .text(row.name);
      }
    } else {
      const barH = row.level <= 2 ? 14 : 10;
      const barY = (rowH - barH) / 2;
      // Base plan bar
      if (row.bstart && row.bend) {
        const x1 = Math.max(0, xScale(row.bstart));
        const x2 = Math.min(chartW, xScale(row.bend));
        if (x2 > x1) {
          const color = row.color || getDeptColor(row.resource);
          const barEl = rowG.append('rect')
            .attr('x', x1).attr('y', barY).attr('width', x2 - x1).attr('height', barH)
            .attr('fill', color).attr('opacity', row.level <= 2 ? .85 : .7).attr('rx', 2)
            .on('mouseover', (e) => showTooltip(e,
              `${row.name}<br>担当: ${row.resource||'—'}<br>基準: ${formatDate(row.bstart)} 〜 ${formatDate(row.bend)}${row.status ? '<br>ステータス: ' + row.status : ''}${row.critical ? '<br>🔴 クリティカルパス' : ''}`))
            .on('mouseout', hideTooltip);
          // Critical path: red border
          if (row.critical) {
            rowG.append('rect')
              .attr('x', x1).attr('y', barY).attr('width', x2 - x1).attr('height', barH)
              .attr('fill', 'none').attr('stroke', '#e53935').attr('stroke-width', 2).attr('rx', 2);
          }
          if (row.isSummary && row.id != null)
            barEl.style('cursor', 'pointer').on('click', () => toggleTLExpand(row.id));
        }
      }
      // Actual progress bar
      if (row.astart) {
        const effectiveEnd = row.aend || rd;
        const x1 = Math.max(0, xScale(row.astart));
        const x2 = Math.min(chartW, xScale(effectiveEnd));
        if (x2 > x1) {
          const aBarH = row.level <= 2 ? 6 : 5;
          rowG.append('rect')
            .attr('x', x1).attr('y', barY + (barH - aBarH) / 2)
            .attr('width', x2 - x1).attr('height', aBarH)
            .attr('fill', '#A0A0A0').attr('opacity', .85).attr('rx', 1)
            .on('mouseover', (e) => showTooltip(e,
              `${row.name}<br>実績: ${formatDate(row.astart)} 〜 ${row.aend ? formatDate(row.aend) : 'TODAY'}`))
            .on('mouseout', hideTooltip);
        }
      }
    }
  });

  // Manual items delete buttons
  allRows.filter(r => r.source === 'manual').forEach(row => {
    const ri = allRows.indexOf(row);
    const origIdx = state.timelineItems.findIndex(m => m.id === row.id);
    if (origIdx < 0) return;
    g.append('text').attr('x', chartW - 4).attr('y', ri * rowH + rowH / 2 + 4)
      .attr('font-size', '12px').attr('fill', '#e53935').attr('cursor', 'pointer')
      .attr('text-anchor', 'end')
      .text('✕').on('click', () => { state.timelineItems.splice(origIdx, 1); saveStorage(); renderTimeline(); });
  });
}

// =====================================================================
// SCREEN 3: NW GRAPH
// =====================================================================
function buildGraph(tasks) {
  const nodes = tasks.map(t => ({...t}));
  const idSet = new Set(nodes.map(n => n.id));
  const edges = [];
  nodes.forEach(n => {
    if (!n.pred) return;
    n.pred.split(',').map(s => parseInt(s.trim())).filter(pid => idSet.has(pid)).forEach(pid => {
      edges.push({source: pid, target: n.id});
    });
  });
  return {nodes, edges};
}

function computeLayout(nodes, edges) {
  if (nodes.length === 0) return;
  const idSet = new Set(nodes.map(n => n.id));
  const succs = {}, inDeg = {};
  nodes.forEach(n => { succs[n.id] = []; inDeg[n.id] = 0; });
  edges.forEach(e => {
    if (idSet.has(e.source) && idSet.has(e.target)) {
      succs[e.source].push(e.target);
      inDeg[e.target]++;
    }
  });
  const depth = {};
  const queue = nodes.filter(n => inDeg[n.id] === 0).map(n => n.id);
  queue.forEach(id => { depth[id] = 0; });
  const visited = new Set(queue);
  while (queue.length > 0) {
    const id = queue.shift();
    succs[id].forEach(sid => {
      depth[sid] = Math.max(depth[sid] || 0, (depth[id] || 0) + 1);
      inDeg[sid]--;
      if (inDeg[sid] === 0 && !visited.has(sid)) { queue.push(sid); visited.add(sid); }
    });
  }
  const byDepth = {};
  nodes.forEach(n => {
    const d = depth[n.id] || 0;
    if (!byDepth[d]) byDepth[d] = [];
    byDepth[d].push(n);
  });
  const NW = 190, NH = 96, CGAP = 60, RGAP = 14;
  nodes.forEach(n => {
    const d = depth[n.id] || 0;
    const col = byDepth[d];
    const idx = col.indexOf(n);
    const colH = col.length * (NH + RGAP) - RGAP;
    n.gx = d * (NW + CGAP);
    n.gy = idx * (NH + RGAP);
    n._colH = colH;
    n._depth = d;
  });
  // Center columns vertically
  const colHeights = {};
  Object.entries(byDepth).forEach(([d, col]) => {
    colHeights[d] = col.length * (NH + RGAP) - RGAP;
  });
  const maxH = Math.max(...Object.values(colHeights));
  nodes.forEach(n => {
    n.gy += (maxH - (colHeights[n._depth] || 0)) / 2;
  });
}

function renderNW() {
  const tasks = state.tasks;
  const regularTasks = tasks.filter(t => !t.isSummary && t.active !== 'いいえ');

  let modeTasks;
  if (state.nwMode === 'cp') {
    modeTasks = regularTasks.filter(t => t.critical === 'はい');
  } else if (state.nwMode === 'sub' && state.nwSelectedId) {
    const depth = state.nwSubDepth || 2;
    const selected = new Set([state.nwSelectedId]);
    const allEdges = [];
    regularTasks.forEach(t => {
      if (!t.pred) return;
      t.pred.split(',').map(s => parseInt(s.trim())).forEach(pid => {
        allEdges.push({source: pid, target: t.id});
      });
    });
    for (let i = 0; i < depth; i++) {
      const toAdd = new Set();
      allEdges.forEach(e => {
        if (selected.has(e.source)) toAdd.add(e.target);
        if (selected.has(e.target)) toAdd.add(e.source);
      });
      toAdd.forEach(id => selected.add(id));
    }
    modeTasks = regularTasks.filter(t => selected.has(t.id));
  } else {
    modeTasks = regularTasks.slice();
  }

  // Dept filter
  if (state.nwDeptFilter && state.nwDeptFilter !== 'all') {
    modeTasks = modeTasks.filter(t => (t.resource || '').includes(state.nwDeptFilter));
  }

  const {nodes, edges} = buildGraph(modeTasks);
  computeLayout(nodes, edges);

  const NW = 190, NH = 96;
  const maxX = nodes.length ? Math.max(...nodes.map(n => n.gx)) + NW + 40 : 400;
  const maxY = nodes.length ? Math.max(...nodes.map(n => n.gy)) + NH + 40 : 300;
  const CANVAS_W = Math.max(maxX + 60, 600);
  const CANVAS_H = Math.max(maxY + 60, 400);

  const deptOptions = ['all', ...DEPTS].map(d =>
    `<option value="${d}" ${state.nwDeptFilter === d ? 'selected' : ''}>${d === 'all' ? '全部門' : d}</option>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div class="nw-controls" style="margin-bottom:10px">
      <button class="btn btn-sm ${state.nwMode==='cp'?'btn-primary':'btn-outline'}" onclick="setNWMode('cp')">CPモード</button>
      <button class="btn btn-sm ${state.nwMode==='all'?'btn-primary':'btn-outline'}" onclick="setNWMode('all')">全体モード</button>
      <button class="btn btn-sm ${state.nwMode==='sub'?'btn-primary':'btn-outline'}" onclick="setNWMode('sub')">サブグラフ</button>
      ${state.nwMode==='sub'?`<label style="font-size:11px">深さ: <input type="number" min="1" max="5" value="${state.nwSubDepth}" style="width:44px;border:1px solid #ccc;border-radius:4px;padding:2px 4px" onchange="state.nwSubDepth=+this.value;renderNW()"></label>`:''}
      <select style="border:1px solid #ccc;border-radius:4px;padding:3px 6px;font-size:11px" onchange="state.nwDeptFilter=this.value;renderNW()">${deptOptions}</select>
      <button class="btn btn-sm btn-outline" onclick="resetNWZoom()">ズームリセット</button>
      <span class="text-muted">${nodes.length}ノード表示中</span>
    </div>
    <div id="nw-wrap">
      <div id="nw-svg-container" style="height:520px">
        <svg id="nw-svg"></svg>
      </div>
      <div id="nw-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <h3 style="margin:0">タスク詳細</h3>
        </div>
        <div id="nw-detail"><p class="text-muted" style="font-size:11px">ノードをクリックして詳細を表示</p></div>
      </div>
    </div>`;

  const svgEl = document.getElementById('nw-svg');
  const containerEl = document.getElementById('nw-svg-container');
  const cW = containerEl.clientWidth;
  const cH = containerEl.clientHeight;

  const svg = d3.select('#nw-svg').attr('width', cW).attr('height', cH);
  svg.selectAll('*').remove();

  const defs = svg.append('defs');
  // Arrow markers
  ['normal','cp'].forEach(type => {
    defs.append('marker').attr('id', `arrow-${type}`)
      .attr('viewBox', '0 -5 10 10').attr('refX', 10).attr('refY', 0)
      .attr('markerWidth', 6).attr('markerHeight', 6).attr('orient', 'auto')
      .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', type === 'cp' ? '#e53935' : '#4472C4');
  });

  const g = svg.append('g').attr('id', 'nw-g');

  // Edges
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  edges.forEach(e => {
    const src = nodeMap[e.source], tgt = nodeMap[e.target];
    if (!src || !tgt) return;
    const isCP = src.critical === 'はい' && tgt.critical === 'はい';
    const sx = src.gx + NW, sy = src.gy + NH / 2;
    const tx = tgt.gx, ty = tgt.gy + NH / 2;
    const cx = (sx + tx) / 2;
    g.append('path')
      .attr('d', `M${sx},${sy} C${cx},${sy} ${cx},${ty} ${tx},${ty}`)
      .attr('fill', 'none')
      .attr('stroke', isCP ? '#e53935' : '#4472C4')
      .attr('stroke-width', isCP ? 2.5 : 1.5)
      .attr('marker-end', `url(#arrow-${isCP ? 'cp' : 'normal'})`)
      .attr('opacity', .8);
  });

  // Nodes
  nodes.forEach(n => {
    const isClose = n.status === 'Close';
    const statusBgColor = isClose ? '#606060' : ({
      'On-going': '#E2EFDA', 'Delay': '#FFE0E0',
      'nActive': '#F2F2F2', 'Disable': '#F2F2F2'
    }[n.status] || '#fff');
    const statusBorderColor = isClose ? '#404040' : ({
      'On-going': '#00B050', 'Delay': '#FF0000',
      'nActive': '#808080', 'Disable': '#BFBFBF'
    }[n.status] || '#ccc');
    const isCP = !isClose && n.critical === 'はい';
    const isSelected = n.id === state.nwSelectedId;
    const textColor = isClose ? '#303030' : '#222';

    const ng = g.append('g').attr('class', 'nw-node')
      .attr('transform', `translate(${n.gx + 20},${n.gy + 20})`)
      .style('cursor', 'pointer')
      .on('click', () => selectNWNode(n.id))
      .on('dblclick', (e) => { e.stopPropagation(); showNWSubPanel(n.id); })
      .on('contextmenu', (e) => { e.preventDefault(); showNWContextMenu(e, n.id); });

    ng.append('rect')
      .attr('width', NW).attr('height', NH)
      .attr('rx', 5)
      .attr('fill', statusBgColor)
      .attr('stroke', isSelected ? '#333' : isCP ? '#e53935' : statusBorderColor)
      .attr('stroke-width', isSelected ? 3 : isCP ? 2.5 : 1.5);

    // CP badge (only for non-Close tasks)
    if (isCP) {
      ng.append('rect').attr('x', NW - 28).attr('y', 0).attr('width', 22).attr('height', 14)
        .attr('rx', 2).attr('fill', '#e53935');
      ng.append('text').attr('x', NW - 17).attr('y', 10).attr('text-anchor', 'middle')
        .attr('font-size', '9px').attr('fill', '#fff').attr('font-weight', '700').text('CP');
    }

    // WBS number
    ng.append('text').attr('x', 8).attr('y', 13)
      .attr('font-size', '9px').attr('fill', isClose ? '#404040' : '#888').text(n.wbs);

    // Task name (wrap at ~22 chars)
    const name = n.name;
    const line1 = name.slice(0, 22);
    const line2 = name.length > 22 ? name.slice(22, 42) + (name.length > 42 ? '…' : '') : '';
    ng.append('text').attr('x', NW / 2).attr('y', line2 ? 28 : 34)
      .attr('text-anchor', 'middle').attr('font-size', '11px').attr('font-weight', '600')
      .attr('fill', textColor).text(line1);
    if (line2) {
      ng.append('text').attr('x', NW / 2).attr('y', 42)
        .attr('text-anchor', 'middle').attr('font-size', '11px').attr('fill', textColor).text(line2);
    }

    // Separator line
    ng.append('line').attr('x1', 6).attr('x2', NW - 6).attr('y1', 58).attr('y2', 58)
      .attr('stroke', isClose ? '#666666' : '#ddd').attr('stroke-width', 1);

    // Status + pct
    ng.append('text').attr('x', NW / 2).attr('y', 71)
      .attr('text-anchor', 'middle').attr('font-size', '10px').attr('fill', isClose ? '#303030' : '#555')
      .text(`${n.status} | ${n.pct}%`);

    // Resource (担当)
    const resLabel = (n.resource || '—').length > 22 ? (n.resource || '—').slice(0, 21) + '…' : (n.resource || '—');
    ng.append('text').attr('x', NW / 2).attr('y', 87)
      .attr('text-anchor', 'middle').attr('font-size', '10px').attr('fill', isClose ? '#404040' : '#4472C4')
      .text(`担当: ${resLabel}`);

    ng.on('mouseover', (e) => showTooltip(e, `<b>${n.name}</b><br>WBS: ${n.wbs}<br>担当: ${n.resource||'—'}<br>ステータス: ${n.status}<br>達成率: ${n.pct}%${isCP ? '<br>🔴 クリティカルパス' : ''}`))
      .on('mouseout', hideTooltip);
  });

  // Zoom/pan
  const zoom = d3.zoom()
    .scaleExtent([0.2, 3])
    .on('zoom', (event) => { g.attr('transform', event.transform); });
  svg.call(zoom);

  // Initial transform to center content
  if (nodes.length > 0) {
    const initScale = Math.min(1, (cW - 40) / (CANVAS_W + 40), (cH - 40) / (CANVAS_H + 40));
    svg.call(zoom.transform, d3.zoomIdentity.translate(20, 20).scale(initScale));
  }
  state._nwZoom = zoom;
  state._nwSvg = svg;
}

window.setNWMode = function(mode) { state.nwMode = mode; renderNW(); };

  if (state._nwSvg && state._nwZoom) {
    state._nwSvg.transition().duration(400).call(state._nwZoom.transform, d3.zoomIdentity.translate(20, 20));
  }
};

// D3 source cache — fetched once, embedded inline in subgraph popup to avoid CDN/CSP issues
let _d3SourceCache = null;
async function _fetchD3Source() {
  if (_d3SourceCache) return _d3SourceCache;
  try {
    const r = await fetch('https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js');
    if (r.ok) _d3SourceCache = await r.text();
  } catch(e) {}
  return _d3SourceCache;
}

// NW subgraph — Blob URL + inline D3 + embedded data (no CDN, no window.opener)
window.showNWSubPanel = async function(id) {
  if (!id) return;
  const depth = state.nwSubPanelDepth || 2;
  const task  = state.tasks.find(t => t.id === id);
  const title = task ? task.name : String(id);

  const d3src = await _fetchD3Source();
  if (!d3src) {
    alert('D3ライブラリの取得に失敗しました。インターネット接続を確認してページをリロードしてください。');
    return;
  }

  // Embed data as JSON literal; escape </ to prevent HTML parser from closing the script tag early
  const dataJson = JSON.stringify({ tasks: state.tasks, focusId: id, title: title, depth: depth, isDark: document.body.classList.contains('dark') })
    .replace(/</g, '\\u003c').replace(/>/g, '\\u003e');

  const html = buildSubgraphWindowHTML(d3src, dataJson);
  const blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  const blobUrl = URL.createObjectURL(blob);
  const win = window.open(blobUrl, '_blank',
    'width=1080,height=700,resizable=yes,scrollbars=yes,menubar=no,toolbar=no');
  if (!win) { URL.revokeObjectURL(blobUrl); alert('ポップアップがブロックされています。ブラウザの設定で許可してください。'); return; }
  win.focus();
  setTimeout(() => URL.revokeObjectURL(blobUrl), 60000);
};

function buildSubgraphWindowHTML(d3src, dataJson) {

  // Data is embedded as a JSON literal (no window.opener dependency).

  return `<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><title>サブグラフ</title>
<script>${d3src}<\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body.dark{background:#1a1a2e;color:#e0e0e0}

body.dark label{color:#aaa}
body.dark #dv{color:#ccc}
</style></head><body>
<div id="hdr">
  <h2>サブグラフ: <span id="ft"></span></h2>
  <label>深さ:
    <input type="range" id="ds" min="1" max="5" value="2" style="width:80px" oninput="dep=+this.value;document.getElementById('dv').textContent=this.value;draw()">
    <span id="dv">2</span>
  </label>
  <button class="btn" onclick="resetZ()">ズームリセット</button>
  <span style="font-size:11px;color:#aaa">ノードをクリックすると中心を変更</span>
</div>
<div id="ctnr"><svg id="sv"></svg></div>
<div id="tip"></div>
<script>
var _data = ${dataJson};
var ALL = _data.tasks || [], fid = _data.focusId || 0, dep = _data.depth || 2, _z, _sv;
if (_data.isDark) document.body.classList.add('dark');
document.title = "サブグラフ: " + (_data.title || fid);
document.getElementById("ft").textContent = _data.title || fid;
document.getElementById("ds").value = dep;
document.getElementById("dv").textContent = dep;

function buildGraph(tasks) {
  var ns = tasks.map(function(t){return Object.assign({},t);}),
      ids = new Set(ns.map(function(n){return n.id;})), es = [];
  ns.forEach(function(n){
    if(!n.pred)return;
    n.pred.split(",").map(function(s){return parseInt(s.trim());})
      .filter(function(p){return ids.has(p);})
      .forEach(function(p){es.push({source:p,target:n.id});});
  });
  return {nodes:ns,edges:es};
}

function layout(nodes,edges) {
  if(!nodes.length)return;
  var ids=new Set(nodes.map(function(n){return n.id;})),succ={},ind={};
  nodes.forEach(function(n){succ[n.id]=[];ind[n.id]=0;});
  edges.forEach(function(e){if(ids.has(e.source)&&ids.has(e.target)){succ[e.source].push(e.target);ind[e.target]++;}});
  var dp={},q=nodes.filter(function(n){return ind[n.id]===0;}).map(function(n){return n.id;});
  q.forEach(function(id){dp[id]=0;});
  var vis=new Set(q);
  while(q.length){var id=q.shift();succ[id].forEach(function(sid){dp[sid]=Math.max(dp[sid]||0,(dp[id]||0)+1);ind[sid]--;if(ind[sid]===0&&!vis.has(sid)){q.push(sid);vis.add(sid);}});}
  var bd={},NW=190,NH=96,CG=60,RG=14;
  nodes.forEach(function(n){var d=dp[n.id]||0;if(!bd[d])bd[d]=[];bd[d].push(n);});
  var ch={};Object.keys(bd).forEach(function(d){ch[d]=bd[d].length*(NH+RG)-RG;});
  var mh=Math.max.apply(null,Object.values(ch));
  nodes.forEach(function(n){var d=dp[n.id]||0,col=bd[d],idx=col.indexOf(n);n.gx=d*(NW+CG);n.gy=idx*(NH+RG)+(mh-ch[d])/2;});
}

function draw() {
  var ct=document.getElementById("ctnr");
  var cW=ct.clientWidth||window.innerWidth||900, cH=ct.clientHeight||window.innerHeight||600;
  var NW=190,NH=96;
  var reg=ALL.filter(function(t){return t.active!=="いいえ";});
  var sel=new Set([fid]),ae=[];
  reg.forEach(function(t){if(!t.pred)return;t.pred.split(",").map(function(s){return parseInt(s.trim());}).forEach(function(p){ae.push({source:p,target:t.id});});});
  for(var i=0;i<dep;i++){var add=new Set();ae.forEach(function(e){if(sel.has(e.source))add.add(e.target);if(sel.has(e.target))add.add(e.source);});add.forEach(function(id){sel.add(id);});}
  var sub=reg.filter(function(t){return sel.has(t.id);});
  var svg=d3.select("#sv").attr("width",cW).attr("height",cH);
  svg.selectAll("*").remove();
  if(!sub.length){svg.append("text").attr("x",cW/2).attr("y",cH/2).attr("text-anchor","middle").attr("font-size","14px").attr("fill","#888").text("関連タスクが見つかりません（深さを増やしてください）");return;}
  var gr=buildGraph(sub);layout(gr.nodes,gr.edges);
  var defs=svg.append("defs");
  ["normal","cp"].forEach(function(type){
    defs.append("marker").attr("id","arr-"+type).attr("viewBox","0 -5 10 10").attr("refX",10).attr("refY",0).attr("markerWidth",6).attr("markerHeight",6).attr("orient","auto")
      .append("path").attr("d","M0,-5L10,0L0,5").attr("fill",type==="cp"?"#e53935":"#4472C4");
  });
  var g=svg.append("g");
  var nm={};gr.nodes.forEach(function(n){nm[n.id]=n;});
  gr.edges.forEach(function(e){
    var s=nm[e.source],t=nm[e.target];if(!s||!t)return;
    var cp=s.critical==="はい"&&t.critical==="はい";
    var sx=s.gx+NW+20,sy=s.gy+NH/2+20,tx=t.gx+20,ty=t.gy+NH/2+20,cx=(sx+tx)/2;
    g.append("path").attr("d","M"+sx+","+sy+" C"+cx+","+sy+" "+cx+","+ty+" "+tx+","+ty)
      .attr("fill","none").attr("stroke",cp?"#e53935":"#4472C4").attr("stroke-width",cp?2.5:1.5)
      .attr("marker-end","url(#arr-"+(cp?"cp":"normal")+")").attr("opacity",.8);
  });
  gr.nodes.forEach(function(n){
    var ic=n.status==="Close";
    var bg=ic?"#D9D9D9":({"On-going":"#E2EFDA","Delay":"#FFE0E0","nActive":"#F2F2F2","Disable":"#F2F2F2"}[n.status]||"#fff");
    var bd=ic?"#AAAAAA":({"On-going":"#00B050","Delay":"#FF0000","nActive":"#808080","Disable":"#BFBFBF"}[n.status]||"#ccc");
    var icp=!ic&&n.critical==="はい",ifo=n.id===fid,tc=ic?"#888":"#222";
    var ng=g.append("g").attr("transform","translate("+(n.gx+20)+","+(n.gy+20)+")").style("cursor","pointer")
      .on("click",function(){fid=n.id;var tk=ALL.find(function(x){return x.id===n.id;});document.getElementById("ft").textContent=tk?tk.name:n.id;draw();})
      .on("mouseover",function(e){var tip=document.getElementById("tip");tip.style.display="block";tip.style.left=(e.clientX+12)+"px";tip.style.top=(e.clientY+8)+"px";tip.innerHTML="<b>"+n.name+"</b><br>担当: "+(n.resource||"—")+"<br>ステータス: "+n.status+"<br>達成率: "+n.pct+"%"+(icp?"<br>🔴 CP":"");})
      .on("mouseout",function(){document.getElementById("tip").style.display="none";});

  {key:'3m', label:'3ヶ月'},
  {key:'6m', label:'6ヶ月'},

// Default column width (px) per period mode
const GANTT_COL_W = {'2w':52, '1m':70, '3m':100, '6m':130};

window.setGanttPeriod = function(p) { state.ganttPeriod = p; renderGantt(); };

function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d;
}

function getWeekKey(dateStr) {
  const d = toDate(dateStr);
  if (!d) return '';
  const start = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayOfWeek = start.getUTCDay() || 7;
  start.setUTCDate(start.getUTCDate() + 4 - dayOfWeek);
  const yearStart = new Date(Date.UTC(start.getUTCFullYear(), 0, 1));
  const weekNum = Math.ceil((((start - yearStart) / 86400000) + 1) / 7);
  return `${start.getUTCFullYear()}-W${String(weekNum).padStart(2,'0')}`;
}

// ── Calendar period helpers ──
function _periodFloor(mode, d) {
  if (mode === '2w') {
    // Align to biweekly boundary from a fixed reference Monday (2015-01-05)
    const monday = getMonday(d);
    const refMs = new Date(2015, 0, 5).getTime();
    const weeks = Math.floor((monday.getTime() - refMs) / (7 * 86400000));
    return new Date(refMs + Math.floor(weeks / 2) * 14 * 86400000);
  }
  if (mode === '1m') return new Date(d.getFullYear(), d.getMonth(), 1);
  if (mode === '3m') return new Date(d.getFullYear(), Math.floor(d.getMonth() / 3) * 3, 1);
  return new Date(d.getFullYear(), d.getMonth() < 6 ? 0 : 6, 1); // 6m
}

function _periodNext(mode, start) {
  if (mode === '2w') return new Date(start.getTime() + 14 * 86400000);
  if (mode === '1m') return new Date(start.getFullYear(), start.getMonth() + 1, 1);
  if (mode === '3m') return new Date(start.getFullYear(), start.getMonth() + 3, 1);
  return new Date(start.getFullYear(), start.getMonth() + 6, 1); // 6m
}

function _periodLabel1(mode, p) {
  const s = p.start;
  if (mode === '2w') return `${s.getFullYear()}/${String(s.getMonth()+1).padStart(2,'0')}`;
  return `${s.getFullYear()}年`;
}

function _periodLabel2(mode, p) {
  const s = p.start;
  if (mode === '2w') return `${s.getMonth()+1}/${s.getDate()}`;
  if (mode === '1m') return `${s.getMonth()+1}月`;
  if (mode === '3m') return `Q${Math.floor(s.getMonth()/3)+1}`;
  return s.getMonth() === 0 ? '上半期' : '下半期';
}

function generateCalendarPeriods(mode, tasks) {
  const dates = tasks.flatMap(t => [toDate(t.bstart), toDate(t.bend)]).filter(Boolean);
  const now = new Date(); now.setHours(0,0,0,0);
  const pMin = dates.length ? new Date(Math.min(...dates.map(d => +d))) : now;
  const pMax = dates.length ? new Date(Math.max(...dates.map(d => +d))) : new Date(now.getFullYear()+1, now.getMonth(), now.getDate());
  let cur = _periodFloor(mode, pMin);
  const stop = _periodNext(mode, _periodFloor(mode, pMax));
  const periods = [];
  while (+cur < +stop && periods.length < 500) {
    const next = _periodNext(mode, cur);
    periods.push({ start: new Date(+cur), endExclusive: new Date(+next) });
    cur = next;
  }
  return periods;
}

function drawGantt() {
  const wrap = document.getElementById('gantt-wrap');
  if (!wrap) return;
  const mode = state.ganttPeriod || '3m';
  const today = toDate(state.reportDate) || new Date();
  const colW = GANTT_COL_W[mode] || 70;

  const periods = generateCalendarPeriods(mode, state.tasks);

  // Build row1 groups (year or month grouping for header row1)
  const groups = [];
  let curG = null;
  periods.forEach(p => {
    const lbl = _periodLabel1(mode, p);
    if (lbl !== (curG && curG.label)) { if (curG) groups.push(curG); curG = {label:lbl, count:1}; }
    else curG.count++;
  });
  if (curG) groups.push(curG);

  let fixedCols = [
    {key:'id',label:'ID',w:40},{key:'wbs',label:'WBS番号',w:70},{key:'name',label:'タスク名',w:200},
    {key:'resource',label:'担当部門',w:80},{key:'pct',label:'達成率',w:65},
    {key:'status',label:'ステータス',w:70},{key:'nw',label:'NW図',w:32}
  ];

  const visibleTasks = [];
  const hiddenParents = new Set();
  state.tasks.forEach(t => {
    const isHidden = t.wbs ? [...hiddenParents].some(hw => t.wbs.startsWith(hw + '.')) : false;
    if (!isHidden) {
      visibleTasks.push(t);
      if (t.isSummary && state.collapsedRows.has(t.id)) hiddenParents.add(t.wbs);
    }
  });

  const savedOrder = JSON.parse(localStorage.getItem('pj_column_order_gantt') || 'null');
  if (savedOrder && savedOrder.length === fixedCols.length) {
    const ordered = savedOrder.map(k => fixedCols.find(c => c.key === k)).filter(Boolean);
    if (ordered.length === fixedCols.length) fixedCols = ordered;
  }

  // ── LEFT TABLE: fixed columns ──
  const totalDefaultWidth = fixedCols.reduce((s, c) => s + c.w, 0);
  let L = `<table class="gantt-fixed-tbl" id="gantt-fixed-tbl" style="width:${totalDefaultWidth}px"><thead><tr>`;
  fixedCols.forEach((c, i) => {
    L += `<th data-col-key="${c.key}" data-col-orig="${i}" style="width:${c.w}px">${c.label}</th>`;
  });
  L += '</tr></thead><tbody>';
  visibleTasks.forEach(task => {
    const isCP = task.critical === 'はい' && !task.isSummary;
    const isSummary = task.isSummary;
    const isCollapsed = state.collapsedRows.has(task.id);
    const indent = {1:'il1',2:'il2',3:'il3'}[task.level] || 'il4';
    L += `<tr class="${isCP?'cp-row':''}${isSummary?' gantt-summary-row':''}" data-task-id="${task.id}">`;
    fixedCols.forEach(c => {
      let val = '';
      if (c.key === 'id') val = `<span style="font-size:10px;color:#aaa">${task.id}</span>`;
      else if (c.key === 'wbs') val = `<span style="font-size:10px;color:#888">${task.wbs}</span>`;
      else if (c.key === 'name') {
        const tog = isSummary
          ? `<span style="cursor:pointer;margin-right:4px;color:#4472C4" onclick="toggleGanttRow(${task.id})">${isCollapsed?'▶':'▼'}</span>`
          : '<span style="display:inline-block;width:18px"></span>';
        val = `<div class="${indent}">${tog}${task.name}</div>`;
      }
      else if (c.key === 'resource') val = `<span style="font-size:10px;color:#888">${task.resource||''}</span>`;
      else if (c.key === 'pct') val = pctBar(task.pct);
      else if (c.key === 'status') val = statusBadge(task.status);
      else if (c.key === 'nw') val = `<span class="nw-icon" onclick="showNWSubPanel(${task.id})" title="サブグラフ">🔗</span>`;
      L += `<td class="gft-cell">${val}</td>`;
    });
    L += '</tr>';
  });
  L += '</tbody></table>';

  // ── RIGHT TABLE: period-based calendar ──
  const calTotalW = periods.length * colW;
  let R = `<table class="gantt-cal-tbl" id="gantt-cal-tbl" style="width:${calTotalW}px;table-layout:fixed"><thead><tr>`;
  groups.forEach(g => R += `<th class="gt-month" colspan="${g.count}" style="width:${g.count*colW}px">${g.label}</th>`);
  R += '</tr><tr>';
  periods.forEach(p => {
    const isTodayCol = +today >= +p.start && +today < +p.endExclusive;
    R += `<th class="gt-header${isTodayCol?' today-col':''}" style="width:${colW}px">${_periodLabel2(mode, p)}</th>`;
  });
  R += '</tr></thead><tbody>';
  visibleTasks.forEach(task => {
    const isCP = task.critical === 'はい' && !task.isSummary;
    const isSummary = task.isSummary;
    const bstart = toDate(task.bstart), bend = toDate(task.bend);
    const astart = toDate(task.astart), aend = toDate(task.aend);
    R += `<tr class="${isCP?'cp-row':''}${isSummary?' gantt-summary-row':''}" data-task-id="${task.id}">`;
    periods.forEach(p => {
      const pDur = +p.endExclusive - +p.start;
      const isTodayCell = +today >= +p.start && +today < +p.endExclusive;
      const baseOvlp = bstart && bend && +bstart < +p.endExclusive && +bend >= +p.start;
      const actEff   = aend || today;
      const actOvlp  = astart && +astart < +p.endExclusive && +actEff >= +p.start;
      let cc = '<div style="position:relative;height:22px">';
      if (baseOvlp) {
        const cs = Math.max(+bstart, +p.start);
        const ce = Math.min(+bend + 86400000, +p.endExclusive);
        cc += `<div class="gantt-bar-base" style="left:${(cs-+p.start)/pDur*100}%;width:${(ce-cs)/pDur*100}%;background:${isSummary?'#2F5597':'#4472C4'}"></div>`;
      }
      if (actOvlp) {
        const cs = Math.max(+astart, +p.start);
        const ce = Math.min(+actEff + 86400000, +p.endExclusive);
        cc += `<div class="gantt-bar-actual" style="left:${(cs-+p.start)/pDur*100}%;width:${(ce-cs)/pDur*100}%"></div>`;
      }
      cc += '</div>';
      R += `<td class="gantt-bar-cell${isTodayCell?' today-bg':''}" style="width:${colW}px">${cc}</td>`;
    });
    R += '</tr>';
  });
  R += '</tbody></table>';

  wrap.innerHTML = `<div class="gantt-split-outer"><div class="gantt-left" id="gantt-left">${L}</div><div id="gantt-divider"></div><div class="gantt-right" id="gantt-right">${R}</div></div>`;

  const gRight = document.getElementById('gantt-right');
  const gLeft  = document.getElementById('gantt-left');
  const splitOuter = wrap.querySelector('.gantt-split-outer');

  // Vertical scroll sync
  if (gRight && gLeft) gRight.addEventListener('scroll', () => { gLeft.scrollTop = gRight.scrollTop; });

  // ── Left panel initial width ──
  requestAnimationFrame(() => {
    if (!gLeft || !gRight || !splitOuter) return;
    const fixedTbl = document.getElementById('gantt-fixed-tbl');
    const leftNaturalW = fixedTbl ? fixedTbl.offsetWidth : totalDefaultWidth;
    const savedLeftW = localStorage.getItem('pj_gantt_left_w');
    if (savedLeftW) {
      gLeft.style.width = savedLeftW;
    } else {
      gLeft.style.width = leftNaturalW + 'px';
    }
  });

  // ── Divider drag: controls LEFT panel width (true split pane) ──
  const divider = document.getElementById('gantt-divider');
  if (divider && gLeft && gRight) {
    divider.addEventListener('mousedown', (e) => {
      e.preventDefault();
      divider.classList.add('resizing');
      const startX = e.clientX, startLeftW = gLeft.offsetWidth;
      // Capture initial column widths for proportional scaling
      const _ftbl = document.getElementById('gantt-fixed-tbl');
      const startColWidths = _ftbl
        ? [..._ftbl.querySelectorAll('thead th')].map(th => parseFloat(th.style.width) || th.offsetWidth)
        : [];
      const onMove = (ev) => {
        const delta = ev.clientX - startX;
        const outerW = splitOuter.offsetWidth;
        const maxLeft = Math.max(50, outerW - 80 - 5);
        const newLeftW = Math.min(maxLeft, Math.max(50, startLeftW + delta));
        gLeft.style.width = newLeftW + 'px';
        // Scale info columns proportionally with the panel
        if (startLeftW > 0 && startColWidths.length) {
          const ratio = newLeftW / startLeftW;
          const fixedTbl = document.getElementById('gantt-fixed-tbl');
          const ths = fixedTbl ? [...fixedTbl.querySelectorAll('thead th')] : [];
          let totalW = 0;
          ths.forEach((th, i) => {
            const w = Math.max(20, Math.round((startColWidths[i] || 80) * ratio));
            th.style.width = w + 'px';
            totalW += w;
          });
          if (fixedTbl && totalW > 0) fixedTbl.style.width = totalW + 'px';
        }
      };
      const onUp = () => {
        divider.classList.remove('resizing');
        // Persist new column widths
        const fixedTbl = document.getElementById('gantt-fixed-tbl');
        if (fixedTbl) {
          const ws = {};
          [...fixedTbl.querySelectorAll('thead th')].forEach((t, i) => { ws[i] = t.offsetWidth + 'px'; });
          localStorage.setItem('pj_column_widths_gantt_fixed', JSON.stringify(ws));
        }
        localStorage.setItem('pj_gantt_left_w', gLeft.style.width);
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  // ── Cal fit button: fit all periods in the right panel ──
  const calFitBtn = (wrap.parentElement || document).querySelector('.gantt-cal-fit-btn');
  if (calFitBtn) {
    calFitBtn.onclick = () => {
      const calTbl = document.getElementById('gantt-cal-tbl');
      if (!calTbl || !gRight) return;
      const row2Ths = [...calTbl.querySelectorAll('thead tr:last-child th')];
      if (!row2Ths.length) return;
      const newW = Math.max(10, Math.floor(gRight.offsetWidth / row2Ths.length));
      row2Ths.forEach(th => { th.style.width = newW + 'px'; });
      const row1Ths = [...calTbl.querySelectorAll('thead tr:first-child th')];
      row1Ths.forEach(th => { const span = parseInt(th.getAttribute('colspan')) || 1; th.style.width = span * newW + 'px'; });
      calTbl.style.width = newW * row2Ths.length + 'px';
      // Also sync body cells
      [...calTbl.querySelectorAll('tbody td.gantt-bar-cell')].forEach((td, i) => {
        td.style.width = newW + 'px';
      });
    };
  }

  enhanceGanttTable(wrap);
}
