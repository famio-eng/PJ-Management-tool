<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PJ進捗管理ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;font-size:13px;background:#f0f2f5;display:flex;height:100vh;overflow:hidden;color:#333}
/* Sidebar */
#sidebar{width:210px;background:#1a3a5c;color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:14px 16px;font-size:14px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.2);letter-spacing:.5px}
.sidebar-info{padding:10px 16px;font-size:11px;color:rgba(255,255,255,.7);border-bottom:1px solid rgba(255,255,255,.15);line-height:1.7}
#sidebar nav a{display:flex;align-items:center;gap:8px;padding:11px 16px;color:rgba(255,255,255,.82);text-decoration:none;cursor:pointer;transition:background .15s;font-size:12px}
#sidebar nav a:hover,#sidebar nav a.active{background:rgba(255,255,255,.15);color:#fff}
.sidebar-footer{margin-top:auto;padding:12px}
/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{background:#fff;border-bottom:1px solid #ddd;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#topbar h1{font-size:15px;font-weight:600;color:#1a3a5c}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.topbar-right label{font-size:11px;color:#666}
#content{flex:1;overflow-y:auto;padding:16px}
/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi-card{background:#fff;border-radius:8px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #ccc}
.kpi-card .kpi-label{font-size:11px;color:#888;margin-bottom:6px}
.kpi-card .kpi-val{font-size:30px;font-weight:700}
.kpi-card.ongoing{border-color:#00B050}.kpi-card.ongoing .kpi-val{color:#00B050}
.kpi-card.delay{border-color:#FF0000}.kpi-card.delay .kpi-val{color:#FF0000}
.kpi-card.close{border-color:#0070C0}.kpi-card.close .kpi-val{color:#0070C0}
.kpi-card.nactive{border-color:#808080}.kpi-card.nactive .kpi-val{color:#808080}
/* Status badges */
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:600;white-space:nowrap}
.s-ongoing{color:#00B050;background:#E2EFDA}.s-delay{color:#FF0000;background:#FFE0E0}
.s-close{color:#0070C0;background:#DDEEFF}.s-nactive{color:#808080;background:#F2F2F2}
.s-disable{color:#BFBFBF;background:#F2F2F2}
/* Sections */
.section{background:#fff;border-radius:8px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.section h2{font-size:13px;font-weight:600;margin-bottom:10px;color:#1a3a5c;border-left:3px solid #1a3a5c;padding-left:8px;display:flex;align-items:center;justify-content:space-between}
/* Tables */
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f5f7fa;padding:7px 6px;text-align:left;font-weight:600;border-bottom:2px solid #e0e0e0;white-space:nowrap;font-size:11px;color:#555}
td{padding:6px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:hover td{background:#fafbff}
.cp-badge{background:#e53935;color:#fff;font-size:9px;padding:1px 4px;border-radius:2px;margin-left:3px;vertical-align:middle}
/* Indent */
.il1{padding-left:0;font-weight:700;font-size:12px}
.il2{padding-left:14px;font-weight:600}
.il3{padding-left:28px}
.il4{padding-left:42px}
/* Buttons */
.btn{padding:5px 13px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:#1a3a5c;color:#fff}
.btn-secondary{background:#4472C4;color:#fff}
.btn-success{background:#00B050;color:#fff}
.btn-danger{background:#e53935;color:#fff}
.btn-outline{background:#fff;border:1px solid #ccc;color:#333}
.btn-sm{padding:3px 8px;font-size:11px}
/* NW Graph */
#nw-wrap{display:flex;gap:0;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
#nw-svg-container{flex:1;min-height:560px;position:relative;overflow:hidden;cursor:grab;background:#f8f9fc}
#nw-svg-container:active{cursor:grabbing}
#nw-svg{width:100%;height:100%}
#nw-panel{width:270px;border-left:1px solid #e0e0e0;padding:14px;overflow-y:auto;font-size:12px;background:#fff;flex-shrink:0}
#nw-panel h3{font-size:13px;font-weight:600;margin-bottom:10px;color:#1a3a5c}
.nw-detail-row{display:flex;margin-bottom:6px;gap:6px}
.nw-detail-label{width:80px;font-size:11px;color:#888;flex-shrink:0}
.nw-detail-val{flex:1;font-weight:500}
.nw-controls{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
/* Timeline */
.tl-controls{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
#tl-outer{display:flex;overflow:hidden}
#tl-labels{flex:0 0 188px;overflow:hidden;position:relative;z-index:5}
#tl-chart{flex:1;overflow-x:auto;min-width:0}
.tl-label-bg{fill:#fff}
body.dark .tl-label-bg{fill:#16213e}
.tl-label-sep{stroke:#ddd;stroke-width:1}
body.dark .tl-label-sep{stroke:#2a3a5c}
/* Gantt */
#gantt-wrap{overflow-x:auto;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.gantt-table{border-collapse:collapse;font-size:11px;min-width:100%}
.gantt-table th,.gantt-table td{border:1px solid #e8e8e8;padding:0}
.gantt-table .gt-cell{padding:4px 5px;white-space:nowrap}
.gantt-table .gt-header{background:#f5f7fa;font-weight:600;font-size:10px;text-align:center;padding:4px 2px}
.gantt-table .gt-month{background:#e8edf5;font-weight:700;font-size:10px;text-align:center;color:#1a3a5c;padding:4px 2px}
.gantt-bar-cell{min-width:20px;padding:0;position:relative;height:26px}
.gantt-bar-base{position:absolute;height:8px;top:4px;border-radius:1px;background:#4472C4;opacity:.8}
.gantt-bar-actual{position:absolute;height:7px;top:14px;border-radius:1px;background:#70AD47;opacity:.9}
.today-col{background:#FFF3E0 !important}
.cp-row td:first-child{border-left:3px solid #e53935}
.gantt-controls{display:flex;gap:8px;padding:10px;border-bottom:1px solid #eee;align-items:center}
.collapsed-children{display:none}
/* Meeting */
.mtg-section{margin-bottom:14px}
.mtg-section-title{font-size:12px;font-weight:600;padding:7px 10px;border-radius:4px;margin-bottom:8px}
.mtg-delay{background:#FFEBEE;color:#C62828}
.mtg-upcoming-start{background:#FFF8E1;color:#E65100}
.mtg-upcoming-end{background:#E8F5E9;color:#1B5E20}
.mtg-cp{background:#FFEBEE;color:#C62828}
textarea.comment-input{border:1px solid #ddd;border-radius:3px;padding:3px 5px;font-size:11px;width:140px;resize:none;height:38px;font-family:inherit}
textarea.comment-input.saved{background:#E8F5E9;border-color:#A5D6A7}
/* Actions */
.action-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.action-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:#f9f9f9;border-radius:6px;border-left:3px solid #ccc}
.action-item.high{border-color:#e53935}
.action-item.mid{border-color:#FB8C00}
.action-item.low{border-color:#43A047}
.action-item.done-item{opacity:.5}
.action-content{flex:1;font-size:12px}
.action-meta{font-size:10px;color:#888;margin-top:2px}
/* Dept */
.dept-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.dept-tab{padding:5px 10px;border:1px solid #ccc;border-radius:4px;cursor:pointer;background:#f5f5f5;font-size:11px;font-weight:500;transition:all .15s}
.dept-tab.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.dept-tab:hover:not(.active){background:#e8edf5}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:8px;padding:22px;width:440px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal h3{margin-bottom:14px;font-size:14px;color:#1a3a5c}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:11px;margin-bottom:3px;color:#666;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;border:1px solid #ccc;border-radius:4px;padding:5px 8px;font-size:12px;font-family:inherit}
.form-row textarea{resize:vertical;min-height:56px}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
/* Tooltip */
.tooltip{position:fixed;background:rgba(20,20,30,.88);color:#fff;padding:7px 11px;border-radius:5px;font-size:11px;pointer-events:none;z-index:9999;display:none;max-width:280px;line-height:1.6}
/* File drop */
.file-area{text-align:center;padding:16px;background:#f9f9f9;border:2px dashed #ccc;border-radius:8px;margin-bottom:12px;font-size:12px;color:#888}
/* NW node */
.nw-node{cursor:pointer}
/* Misc */
.nw-icon{cursor:pointer;color:#4472C4;font-size:13px;display:inline-block;transition:transform .1s}
.nw-icon:hover{transform:scale(1.3);color:#1a3a5c}
.flex-row{display:flex;align-items:center;gap:8px}
.text-muted{color:#888;font-size:11px}
.pct-bar{display:inline-block;width:50px;height:6px;background:#e0e0e0;border-radius:3px;vertical-align:middle;margin-right:4px;position:relative;overflow:hidden}
.pct-fill{position:absolute;left:0;top:0;height:100%;background:#4472C4;border-radius:3px}
/* Print */
@media print{
  #sidebar,#topbar .topbar-right,.btn,.nw-controls,.tl-controls,.gantt-controls,.dept-tabs,.modal-overlay{display:none!important}
  body{overflow:visible}
  #main{overflow:visible}
  #content{overflow:visible;padding:0}
  .section,.kpi-card{box-shadow:none;border:1px solid #ddd}
  page{size:A3 landscape}
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f1f1f1}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
/* ===== DARK MODE ===== */
body.dark{background:#1a1a2e;color:#e0e0e0}
body.dark #sidebar{background:#0d1f3c}
body.dark .sidebar-info{color:rgba(200,210,230,.8);border-color:rgba(255,255,255,.1)}
body.dark #topbar{background:#16213e;border-color:#3a3a5c}
body.dark #topbar h1{color:#90b8e0}
body.dark .topbar-right label{color:#aaa}
body.dark .topbar-right input[type="date"]{background:#1a1a2e;border-color:#3a3a5c;color:#e0e0e0}
body.dark #content{background:transparent}
body.dark .section{background:#16213e;box-shadow:0 1px 3px rgba(0,0,0,.3)}
body.dark .kpi-card{background:#16213e;box-shadow:0 1px 3px rgba(0,0,0,.3)}
body.dark .kpi-card.ongoing{border-color:#4CAF50}.body.dark .kpi-card.ongoing .kpi-val{color:#4CAF50}
body.dark th{background:#1e2a45;color:#b0bec5;border-color:#3a3a5c}
body.dark td{border-color:#2a2a4a;color:#d0d8e8}
body.dark tr:hover td{background:#1e2a45}
body.dark .modal{background:#16213e;color:#e0e0e0}
body.dark .modal h3{color:#90b8e0}
body.dark .form-row input,body.dark .form-row select,body.dark .form-row textarea{background:#1a1a2e;border-color:#3a3a5c;color:#e0e0e0}
body.dark .btn-outline{background:#16213e;border-color:#3a3a5c;color:#ccc}
body.dark .btn-outline:hover{background:#1e2a45}
body.dark .dept-tab{background:#1e2a45;border-color:#3a3a5c;color:#ccc}
body.dark .dept-tab.active{background:#1a3a5c;border-color:#1a3a5c}
body.dark .dept-tab:hover:not(.active){background:#243555}
body.dark .action-item{background:#1e2a45}
body.dark .action-meta{color:#7a8a9a}
body.dark .file-area{background:#1e2a45;border-color:#3a3a5c;color:#888}
body.dark #nw-panel{background:#16213e;border-color:#3a3a5c}
body.dark #nw-svg-container{background:#1a1a2e}
body.dark .nw-detail-label{color:#7a8a9a}
body.dark .gantt-table th{background:#1e2a45;border-color:#3a3a5c}
body.dark .gantt-table td{border-color:#2a2a4a}
body.dark .gantt-controls{border-color:#3a3a5c}
body.dark .gt-month{background:#243555;color:#90b8e0}
body.dark .gt-header{background:#1e2a45;color:#b0bec5}
body.dark textarea.comment-input{background:#1a1a2e;border-color:#3a3a5c;color:#e0e0e0}
body.dark .text-muted{color:#7a8a9a}
body.dark .mtg-delay{background:#3d1515;color:#ef9a9a}
body.dark .mtg-upcoming-start{background:#3d2e00;color:#ffcc80}
body.dark .mtg-upcoming-end{background:#1b3320;color:#a5d6a7}
body.dark .mtg-cp{background:#3d1515;color:#ef9a9a}
body.dark .sidebar-footer .btn-outline{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}
/* Night mode toggle */
#night-toggle{background:none;border:1px solid #ccc;border-radius:20px;padding:3px 8px;cursor:pointer;font-size:15px;transition:all .2s;line-height:1}
#night-toggle:hover{background:rgba(0,0,0,.08)}
body.dark #night-toggle{border-color:#3a3a5c;color:#e0e0e0}
body.dark #night-toggle:hover{background:rgba(255,255,255,.1)}
/* Column resize handle */
.col-resizer{position:absolute;right:0;top:0;width:5px;height:100%;cursor:col-resize;user-select:none;z-index:2}
.col-resizer:hover,.col-resizer.resizing{background:rgba(68,114,196,.4)}
/* Column filter dropdown */
.col-filter-dropdown{position:fixed;background:#fff;border:1px solid #ccc;border-radius:6px;padding:8px;z-index:9999;max-height:240px;overflow-y:auto;box-shadow:0 4px 14px rgba(0,0,0,.18);min-width:160px;font-size:12px}
body.dark .col-filter-dropdown{background:#16213e;border-color:#3a3a5c;color:#e0e0e0}
.filter-btn{font-size:9px;margin-left:3px;cursor:pointer;color:#bbb;border:none;background:none;padding:1px 2px;vertical-align:middle}
.filter-btn.active{color:#4472C4;font-weight:700}
body.dark .filter-btn.active{color:#90b8e0}
/* Drag over for col reorder */
th.drag-over{background:#d0e4f7!important;outline:2px dashed #4472C4;outline-offset:-2px}
body.dark th.drag-over{background:#243555!important;outline-color:#90b8e0}
/* Gantt dark mode - class-based overrides */
.gantt-summary-row td { background: #f5f7fa; }
body.dark .gantt-summary-row td { background: #1a2535 !important; }
body.dark .gantt-table .today-bg { background: #2c2010 !important; }
body.dark .gantt-table td.gt-cell { color: #d0d8e8; }
/* Gantt: default cell and wrap background in dark mode */
body.dark #gantt-wrap { background: #16213e; }
body.dark .gantt-table td { background: #16213e; }
/* Section headings in dark mode */
body.dark .section h2 { color: #90b8e0; border-left-color: #4472C4; }
/* Timeline SVG container - transparent so section dark bg shows through */
body.dark #tl-labels { background: #16213e; }
body.dark #tl-chart  { background: transparent; }
/* Timeline SVG CSS classes for dark mode */
.tl-gridline { stroke: #e0e0e0; stroke-width: 1; }
body.dark .tl-gridline { stroke: #3a3a5c; }
.tl-month-text { fill: #666; }
body.dark .tl-month-text { fill: #7a8a9a; }
.tl-row-even { fill: #fafbff; opacity: .5; }
body.dark .tl-row-even { fill: #1e2a45; opacity: .5; }
.tl-row-odd { fill: #fff; opacity: .5; }
body.dark .tl-row-odd { fill: #16213e; opacity: .5; }
.tl-task-text { fill: #333; }
body.dark .tl-task-text { fill: #d0d8e8; }
/* Task list panel row backgrounds (dark mode) */
#tl-task-list tr.tl-list-l1 { background: #f0f4fa; }
#tl-task-list tr.tl-list-l2 { background: #f8faff; }
body.dark #tl-task-list tr.tl-list-l1 { background: #1a2a45; }
body.dark #tl-task-list tr.tl-list-l2 { background: #16223a; }
body.dark #tl-task-list thead tr { background: #1e2d50 !important; }
body.dark #tl-task-list td, body.dark #tl-task-list th { color: #c8d4e8; border-color: #243050; }
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div id="sidebar">
  <div class="sidebar-logo">📊 PJ進捗管理</div>
  <div class="sidebar-info">
    <div id="sb-pj-name" style="font-weight:600;color:#fff;margin-bottom:2px">医療機器開発PJ-A</div>
    <div>次回定例予定日: <span id="sb-report-date">2026-05-18</span></div>
  </div>
  <nav id="sidebar-nav">
    <a data-screen="dashboard" class="active">🏠 ダッシュボード</a>
    <a data-screen="timeline">📅 大日程タイムライン</a>
    <a data-screen="nw">🔗 NW図</a>
    <a data-screen="gantt">📋 ガントチャート</a>
    <a data-screen="meeting">📝 定例ビュー</a>
    <a data-screen="dept">👥 機能別進捗報告</a>
  </nav>
  <div class="sidebar-footer">
    <input type="file" id="excel-file-input" accept=".xlsx,.xls" style="display:none">
    <button class="btn btn-outline" style="width:100%;font-size:11px" onclick="document.getElementById('excel-file-input').click()">📂 Excelインポート</button>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div id="main">
  <div id="topbar">
    <h1 id="topbar-title">ダッシュボード</h1>
    <div class="topbar-right">
      <label>次回定例予定日: <input type="date" id="input-report-date" style="border:1px solid #ccc;border-radius:4px;padding:3px 7px;font-size:12px"></label>
      <button class="btn btn-primary btn-sm" onclick="saveSettings()">保存</button>
      <button class="btn btn-outline btn-sm" onclick="window.print()">🖨 印刷</button>
      <button id="night-toggle" onclick="toggleTheme()" title="ダーク/ライトモード切替">🌙</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<!-- ===== MODALS ===== -->
<div class="modal-overlay" id="action-modal">
  <div class="modal">
    <h3>＋ アクション追加</h3>
    <div class="form-row"><label>内容</label><textarea id="act-content" rows="2"></textarea></div>
    <div class="form-row"><label>担当者</label><input type="text" id="act-owner"></div>
    <div class="form-row"><label>期限</label><input type="date" id="act-deadline"></div>
    <div class="form-row"><label>優先度</label>
      <select id="act-priority"><option>高</option><option selected>中</option><option>低</option></select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal('action-modal')">キャンセル</button>
      <button class="btn btn-primary" onclick="addAction()">追加</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="tl-item-modal">
  <div class="modal">
    <h3>＋ タイムラインアイテム追加</h3>
    <div class="form-row"><label>表示名</label><input type="text" id="tl-name"></div>
    <div class="form-row"><label>種類</label>
      <select id="tl-type"><option value="phase">フェーズ</option><option value="milestone">マイルストーン</option></select>
    </div>
    <div class="form-row" id="tl-date-row1"><label>開始日</label><input type="date" id="tl-start"></div>
    <div class="form-row" id="tl-date-row2"><label>終了日</label><input type="date" id="tl-end"></div>
    <div class="form-row"><label>表示色</label><input type="color" id="tl-color" value="#7030A0" style="width:60px;height:30px;padding:2px;border:1px solid #ccc;border-radius:4px"></div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal('tl-item-modal')">キャンセル</button>
      <button class="btn btn-primary" onclick="addTimelineItem()">追加</button>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// =====================================================================
// SAMPLE DATA (30 tasks – 医療機器開発プロジェクト)
// =====================================================================
const SAMPLE_TASKS = [
  // ── レベル1サマリー ──
  {id:1,wbs:'1',level:1,name:'医療機器開発PJ-A',note:'プロジェクト全体',duration:'',
   start:'2026-01-05',end:'2026-12-25',bstart:'2026-01-05',bend:'2026-12-25',
   astart:'2026-01-05',aend:null,remain:'180 days',

// =====================================================================
// STATUS ENGINE (MSP計算式の完全再現)
// =====================================================================
function toDate(s) {
  if (!s) return null;
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function daysBetween(a, b) {
  if (!a || !b) return 0;
  return Math.round((b - a) / 86400000);
}

function isZeroDays(remain) {
  if (!remain) return false;
  return remain.trim() === '0 days' || remain.trim() === '0 d' || remain.trim() === '0';
}

function calcStatus(task, allTasks, reportDate) {
  const rd = toDate(reportDate);
  if (!rd) return 'nActive';

  if (task.active === 'いいえ') return 'Disable';

  if (task.isSummary) {
    const astart = toDate(task.astart);
    const bstart = toDate(task.bstart);
    if (!astart && bstart && rd < bstart) return 'nActive';
    // Check children for Delay
    const children = allTasks.filter(t => {
      if (t.id === task.id) return false;
      return t.wbs.startsWith(task.wbs + '.') && !t.wbs.slice(task.wbs.length + 1).includes('.');
    });
    const childStatuses = children.map(c => calcStatus(c, allTasks, reportDate));
    if (childStatuses.some(s => s === 'Delay')) return 'Delay';
    if (task.pct >= 100 && isZeroDays(task.remain)) return 'Close';
    return 'On-going';
  } else {
    const bstart = toDate(task.bstart);
    const bend = toDate(task.bend);
    if (bstart && rd < bstart) return 'nActive';
    if (task.pct >= 100) return 'Close';
    if (bend && rd > bend) return 'Delay';
    if (bstart && bend) {
      const total = daysBetween(bstart, bend);
      if (total > 0) {
        const elapsed = daysBetween(bstart, rd);
        const expected = Math.floor((elapsed / total) * 100);
        if (task.pct >= expected) return 'On-going';
        return 'Delay';
      }
    }
    return 'On-going';
  }
}

function computeAllStatuses() {
  state.tasks.forEach(t => {
    t.status = calcStatus(t, state.tasks, state.reportDate);
  });
}

function statusBadge(s) {
  const cls = {
    'On-going':'s-ongoing','Delay':'s-delay','Close':'s-close',
    'nActive':'s-nactive','Disable':'s-disable'
  }[s] || 's-nactive';
  return `<span class="badge ${cls}">${s}</span>`;
}

function pctBar(pct) {
  return `<span class="pct-bar"><span class="pct-fill" style="width:${pct}%"></span></span>${pct}%`;
}

document.getElementById('excel-file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {raw:false});
      const colMap = {
        'ID':'id','WBS_番号':'wbs','アウトライン_レベル':'level','タスク名':'name',
        'Note':'note','期間':'duration','開始日':'start','終了日':'end',
        '基準開始日':'bstart','基準終了日':'bend','実績開始日':'astart','実績終了日':'aend',
        '残存期間':'remain','先行タスク':'pred','リソース名':'resource','達成率':'pct',
        'クリティカル':'critical','アクティブ':'active','アウトラインフィールド':'isSummaryRaw'
      };
      state.tasks = rows.map((row, i) => {
        const t = {};
        Object.entries(colMap).forEach(([jp, en]) => {
          t[en] = row[jp] !== undefined ? row[jp] : (en === 'isSummaryRaw' ? '' : null);
        });
        t.id = parseInt(t.id) || (i + 1);
        t.level = parseInt(t.level) || 1;
        t.pct = parseFloat(String(t.pct || '0').replace('%','')) || 0;
        t.isSummary = t.isSummaryRaw === 'はい' || t.level === 1;
        return t;
      });
      computeAllStatuses();
      renderScreen();
    } catch(err) {
      alert('Excelの読み込みに失敗しました: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  this.value = '';
});

function renderDashboard() {
  computeAllStatuses();
  const tasks = state.tasks;
  const regularTasks = tasks.filter(t => !t.isSummary && t.active === 'はい');
  const rd = toDate(state.reportDate);
  const rd14 = new Date(rd.getTime() + 14 * 86400000);

  const counts = {ongoing:0, delay:0, close:0, nactive:0};
  regularTasks.forEach(t => {
    if (t.status === 'On-going') counts.ongoing++;
    else if (t.status === 'Delay') counts.delay++;
    else if (t.status === 'Close') counts.close++;
    else if (t.status === 'nActive') counts.nactive++;
  });

  const delayTasks = regularTasks.filter(t => t.status === 'Delay');
  const upcomingStart = regularTasks.filter(t => {
    const bs = toDate(t.bstart);
    return bs && bs > rd && bs <= rd14;
  });
  const upcomingEnd = regularTasks.filter(t => {
    const be = toDate(t.bend);
    return be && be >= rd && be <= rd14 && t.status !== 'Close';
  });

  // Dept summary
  const deptRows = DEPTS.map(dept => {
    const deptTasks = regularTasks.filter(t => (t.resource || '').includes(dept));
    const dc = {ongoing:0,delay:0,close:0,nactive:0};
    deptTasks.forEach(t => {
      if (t.status === 'On-going') dc.ongoing++;
      else if (t.status === 'Delay') dc.delay++;
      else if (t.status === 'Close') dc.close++;
      else if (t.status === 'nActive') dc.nactive++;
    });
    return {dept, ...dc, total: deptTasks.length};
  }).filter(r => r.total > 0);

  const html = `

// Build map: taskId → [directChildId, ...]
function buildChildrenMap() {
  const childrenOf = {};
  state.tasks.forEach(t => { childrenOf[t.id] = []; });
  const parentStack = []; // [{id, level}]
  state.tasks.forEach(t => {
    while (parentStack.length && parentStack[parentStack.length - 1].level >= t.level) {
      parentStack.pop();
    }
    if (parentStack.length) {
      childrenOf[parentStack[parentStack.length - 1].id].push(t.id);
    }
    parentStack.push({ id: t.id, level: t.level });
  });
  return childrenOf;
}

// Initialize tlSelectedIds (level1+2 + milestones) and tlExpandedIds (level1 summaries expanded)
function initTLSelection() {
  if (state.tlSelectedIds.size > 0) return;
  const childrenOf = buildChildrenMap();
  state.tasks.forEach(t => {
    if (t.active === 'いいえ') return;
    if (t.level <= 2 || t.duration === '0 days') {
      state.tlSelectedIds.add(t.id);
    }
  });
  // Expand all level-1 summaries so level-2 tasks appear below them by default
  state.tasks.forEach(t => {
    if (t.level === 1 && (childrenOf[t.id] || []).some(cid => state.tlSelectedIds.has(cid))) {
      state.tlExpandedIds.add(t.id);
    }
  });
}

// Build immediate-parent map: taskId → parentId (or null)
function buildParentMap() {
  const parentOf = {};
  const parentStack = [];
  state.tasks.forEach(t => {
    while (parentStack.length && parentStack[parentStack.length - 1].level >= t.level) {
      parentStack.pop();
    }
    parentOf[t.id] = parentStack.length ? parentStack[parentStack.length - 1].id : null;
    parentStack.push({ id: t.id, level: t.level });
  });
  return parentOf;
}

// Return array of row objects for drawTimeline()
function buildTLRows() {
  const childrenOf = buildChildrenMap();
  const parentOf = buildParentMap();

  // A task is visible if: selected AND (no selected parent OR parent is expanded)
  function isVisible(t) {
    if (!state.tlSelectedIds.has(t.id)) return false;
    const pid = parentOf[t.id];
    if (pid == null) return true;
    if (!state.tlSelectedIds.has(pid)) return true; // parent not selected → show independently
    return state.tlExpandedIds.has(pid);            // parent selected → only if expanded
  }

  const rows = [];
  state.tasks.forEach(t => {
    if (t.active === 'いいえ') return;
    if (!isVisible(t)) return;
    const hasSelectedChildren = (childrenOf[t.id] || []).some(cid => state.tlSelectedIds.has(cid));
    rows.push({
      id: t.id,
      name: t.name,
      bstart: toDate(t.bstart), bend: toDate(t.bend),
      astart: toDate(t.astart), aend: toDate(t.aend),
      isMilestone: t.duration === '0 days',
      status: t.status,
      level: t.level,
      resource: t.resource || '',
      source: 'auto',
      color: null,
      critical: t.critical === 'はい',
      isSummary: hasSelectedChildren,
      isExpanded: state.tlExpandedIds.has(t.id),
    });
  });

  // Manual items always shown
  state.timelineItems.forEach(m => {
    rows.push({
      id: m.id,
      name: m.name,
      bstart: toDate(m.date || m.start), bend: toDate(m.end || m.date),
      astart: null, aend: null,
      isMilestone: m.type === 'milestone',
      status: null, level: 3, resource: '',
      source: 'manual', color: m.color,
      isSummary: false, isExpanded: false,
    });
  });

  return rows;
}

  const activeTasks = state.tasks.filter(t => t.active !== 'いいえ');

  const someChecked = activeTasks.some(t => state.tlSelectedIds.has(t.id));

  let html = `<table style="width:100%;border-collapse:collapse;font-size:11px">
    <thead><tr style="background:#f0f4fa;position:sticky;top:0;z-index:1">
      <th style="width:28px;padding:4px 6px;text-align:center">
        <input type="checkbox" id="tl-chk-all" ${allChecked ? 'checked' : ''} onchange="toggleAllTLTasks(this.checked)">
      </th>

      <th style="width:64px;padding:4px 6px">ステータス</th>
    </tr></thead><tbody>`;

  activeTasks.forEach(t => {
    const checked = state.tlSelectedIds.has(t.id);

    const bold = t.level <= 2;
    const rowCls = t.level === 1 ? 'tl-list-l1' : t.level === 2 ? 'tl-list-l2' : '';
    const isCritical = t.critical === 'はい';
    const name = t.name.length > 32 ? t.name.slice(0, 31) + '…' : t.name;
    html += `<tr class="${rowCls}" style="border-bottom:1px solid #f0f0f0">
      <td style="text-align:center;padding:3px 6px">

      </td>
      <td style="padding:3px 6px 3px ${6 + indent}px;font-weight:${bold ? '600' : '400'}${isCritical ? ';color:#e53935' : ''}">${isCritical ? '🔴 ' : ''}${name}</td>
      <td style="padding:3px 6px">${t.bstart || ''}</td>

      <td style="padding:3px 6px">${t.status || ''}</td>

  });

  html += '</tbody></table>';
  return html;
}

window.toggleTLTask = function(id, checked) {
  if (checked) state.tlSelectedIds.add(id);
  else { state.tlSelectedIds.delete(id); state.tlExpandedIds.delete(id); }
  saveStorage();
  // Update "all" checkbox state
  const allCb = document.getElementById('tl-chk-all');
  if (allCb) {
    const active = state.tasks.filter(t => t.active !== 'いいえ');
    allCb.checked = active.length > 0 && active.every(t => state.tlSelectedIds.has(t.id));
  }
  drawTimeline();
};

window.toggleAllTLTasks = function(checked) {
  state.tasks.forEach(t => {
    if (t.active === 'いいえ') return;
    if (checked) state.tlSelectedIds.add(t.id);
    else { state.tlSelectedIds.delete(t.id); state.tlExpandedIds.delete(t.id); }
  });
  saveStorage();
  document.querySelectorAll('#tl-task-list input[data-tid]').forEach(cb => { cb.checked = checked; });
  drawTimeline();
};

window.toggleTLPanel = function() {
  const panel = document.getElementById('tl-task-list');

  const hidden = panel.style.display === 'none';
  panel.style.display = hidden ? '' : 'none';

};

window.toggleTLExpand = function(id) {
  if (state.tlExpandedIds.has(id)) state.tlExpandedIds.delete(id);

};

window.scrollTLToday = function() {
  const chartEl = document.getElementById('tl-chart');
  const meta = state._tlChartMeta;
  if (!chartEl || !meta) return;
  const { startDate, endDate, chartW } = meta;
  const rd = toDate(state.reportDate);
  const xScale = d3.scaleTime().domain([startDate, endDate]).range([0, chartW]);
  const todayX = xScale(rd);
  chartEl.scrollLeft = Math.max(0, todayX - chartEl.clientWidth / 3);
};

function drawTimeline() {
  const labelsEl = document.getElementById('tl-labels');
  const chartEl  = document.getElementById('tl-chart');
  if (!labelsEl || !chartEl) return;

  const rd = toDate(state.reportDate);

  // ── Compute date range from all active tasks ──────────────────────────
  let minD = null, maxD = null;
  state.tasks.filter(t => t.active !== 'いいえ').forEach(t => {
    const s = toDate(t.bstart), e = toDate(t.bend);
    if (s && (!minD || s < minD)) minD = s;
    if (e && (!maxD || e > maxD)) maxD = e;
  });
  state.timelineItems.forEach(m => {
    const s = toDate(m.date || m.start), e = toDate(m.end || m.date || m.start);
    if (s && (!minD || s < minD)) minD = s;
    if (e && (!maxD || e > maxD)) maxD = e;
  });
  if (!minD) minD = new Date(rd.getFullYear(), rd.getMonth() - 3, 1);
  if (!maxD) maxD = new Date(rd.getFullYear(), rd.getMonth() + 9, 1);

  const startDate = new Date(minD.getFullYear(), minD.getMonth() - 1, 1);
  const endDate   = new Date(maxD.getFullYear(), maxD.getMonth() + 2, 1);

  const PX_PER_MONTH = state.tlZoom || 65;
  const totalMonths  = (endDate.getFullYear() - startDate.getFullYear()) * 12
                     + (endDate.getMonth() - startDate.getMonth());
  const chartW = Math.max(totalMonths * PX_PER_MONTH, 400);
  state._tlChartMeta = { startDate, endDate, chartW };

  // ── Rows ──────────────────────────────────────────────────────────────
  const allRows = buildTLRows(); // selection-filtered, no date filter here

  const labelW = 188;
  const marginT = 44, marginB = 20;
  const rowH = 34;
  const H = marginT + allRows.length * rowH + marginB;

  const xScale = d3.scaleTime().domain([startDate, endDate]).range([0, chartW]);

  // ── Label SVG (fixed left column) ────────────────────────────────────
  const labelSvg = d3.select(labelsEl).selectAll('svg').data([1]).join('svg')
    .attr('width', labelW).attr('height', H);
  labelSvg.selectAll('*').remove();

  // header background
  labelSvg.append('rect').attr('x', 0).attr('y', 0).attr('width', labelW).attr('height', marginT)
    .attr('class', 'tl-label-bg');
  // separator line
  labelSvg.append('line').attr('x1', labelW - 1).attr('x2', labelW - 1)
    .attr('y1', 0).attr('y2', H).attr('class', 'tl-label-sep');

  allRows.forEach((row, i) => {
    const y = marginT + i * rowH;
    labelSvg.append('rect').attr('x', 0).attr('y', y).attr('width', labelW).attr('height', rowH)
      .attr('class', i % 2 === 0 ? 'tl-row-even' : 'tl-row-odd');

    const indent = row.level === 1 ? 4 : row.level === 2 ? 14 : 22;
    const label  = row.name.length > 22 ? row.name.slice(0, 21) + '…' : row.name;
    const icon   = row.isSummary ? (row.isExpanded ? '▼ ' : '▶ ') : '';
    const prefix = row.source === 'manual' ? '✏ ' : icon;

    const lbl = labelSvg.append('text')
      .attr('x', indent).attr('y', y + rowH / 2 + 4)
      .attr('font-size', row.level === 1 ? '12px' : '11px')
      .attr('font-weight', row.level <= 2 ? '600' : '400')
      .attr('class', 'tl-task-text')
      .text(prefix + label);
    if (row.isSummary && row.id != null)
      lbl.style('cursor', 'pointer').on('click', () => toggleTLExpand(row.id));
  });

  // ── Chart SVG (scrollable) ────────────────────────────────────────────
  const chartSvg = d3.select(chartEl).selectAll('svg').data([1]).join('svg')
    .attr('width', chartW + 6).attr('height', H);
  chartSvg.selectAll('*').remove();

  const g = chartSvg.append('g').attr('transform', `translate(0,${marginT})`);

  // header bg for chart area
  chartSvg.append('rect').attr('x', 0).attr('y', 0).attr('width', chartW + 6).attr('height', marginT)
    .attr('class', 'tl-label-bg');

  // Month gridlines + labels
  d3.timeMonths(startDate, endDate).forEach(m => {
    const x = xScale(m);
    g.append('line').attr('x1', x).attr('x2', x).attr('y1', -marginT).attr('y2', allRows.length * rowH)
      .attr('class', 'tl-gridline');
    g.append('text').attr('x', x + 4).attr('y', -14)
      .attr('font-size', '10px').attr('class', 'tl-month-text')
      .text(d3.timeFormat('%Y/%m')(m));
  });

  // TODAY line
  const tx = xScale(rd);
  if (tx >= 0 && tx <= chartW) {
    g.append('line').attr('x1', tx).attr('x2', tx).attr('y1', -marginT).attr('y2', allRows.length * rowH)
      .attr('stroke', 'orange').attr('stroke-width', 2).attr('stroke-dasharray', '4,3');
    g.append('text').attr('x', tx + 2).attr('y', -marginT + 12)
      .attr('font-size', '10px').attr('fill', 'orange').text('TODAY');
  }

  // Rows
  allRows.forEach((row, i) => {
    const y = i * rowH;
    const rowG = g.append('g').attr('transform', `translate(0,${y})`);

    rowG.append('rect').attr('x', 0).attr('y', 0).attr('width', chartW).attr('height', rowH)
      .attr('class', i % 2 === 0 ? 'tl-row-even' : 'tl-row-odd');

    if (row.isMilestone) {
      const mx = xScale(row.bstart);
      if (mx >= 0 && mx <= chartW) {
        const color = row.color || '#e53935';
        const d = 8;
        rowG.append('path')
          .attr('d', `M${mx},${rowH/2-d} L${mx+d},${rowH/2} L${mx},${rowH/2+d} L${mx-d},${rowH/2} Z`)
          .attr('fill', color).attr('stroke', color);
        rowG.append('text').attr('x', mx + d + 4).attr('y', rowH / 2 + 4)
          .attr('font-size', '10px').attr('fill', color).attr('font-weight', '600')
          .text(row.name);
      }
    } else {
      const barH = row.level <= 2 ? 14 : 10;
      const barY = (rowH - barH) / 2;
      // Base plan bar
      if (row.bstart && row.bend) {
        const x1 = Math.max(0, xScale(row.bstart));
        const x2 = Math.min(chartW, xScale(row.bend));
        if (x2 > x1) {
          const color = row.color || getDeptColor(row.resource);
          const barEl = rowG.append('rect')
            .attr('x', x1).attr('y', barY).attr('width', x2 - x1).attr('height', barH)
            .attr('fill', color).attr('opacity', row.level <= 2 ? .85 : .7).attr('rx', 2)
            .on('mouseover', (e) => showTooltip(e,
              `${row.name}<br>担当: ${row.resource||'—'}<br>基準: ${row.bstart?.toLocaleDateString('ja-JP')} 〜 ${row.bend?.toLocaleDateString('ja-JP')}${row.status ? '<br>ステータス: ' + row.status : ''}${row.critical ? '<br>🔴 クリティカルパス' : ''}`))
            .on('mouseout', hideTooltip);
          // Critical path: red border
          if (row.critical) {
            rowG.append('rect')
              .attr('x', x1).attr('y', barY).attr('width', x2 - x1).attr('height', barH)
              .attr('fill', 'none').attr('stroke', '#e53935').attr('stroke-width', 2).attr('rx', 2);
          }
          if (row.isSummary && row.id != null)
            barEl.style('cursor', 'pointer').on('click', () => toggleTLExpand(row.id));
        }
      }
      // Actual progress bar
      if (row.astart) {
        const effectiveEnd = row.aend || rd;
        const x1 = Math.max(0, xScale(row.astart));
        const x2 = Math.min(chartW, xScale(effectiveEnd));
        if (x2 > x1) {
          const aBarH = row.level <= 2 ? 6 : 5;
          rowG.append('rect')

      }
    }

  // Manual items delete buttons
  allRows.filter(r => r.source === 'manual').forEach(row => {
    const ri = allRows.indexOf(row);

      .attr('text-anchor', 'end')

  });
}

// =====================================================================
// SCREEN 3: NW GRAPH
// =====================================================================
function buildGraph(tasks) {
  const nodes = tasks.map(t => ({...t}));
  const idSet = new Set(nodes.map(n => n.id));
  const edges = [];
  nodes.forEach(n => {
    if (!n.pred) return;
    n.pred.split(',').map(s => parseInt(s.trim())).filter(pid => idSet.has(pid)).forEach(pid => {
      edges.push({source: pid, target: n.id});
    });
  });
  return {nodes, edges};
}

function computeLayout(nodes, edges) {
  if (nodes.length === 0) return;
  const idSet = new Set(nodes.map(n => n.id));
  const succs = {}, inDeg = {};
  nodes.forEach(n => { succs[n.id] = []; inDeg[n.id] = 0; });
  edges.forEach(e => {
    if (idSet.has(e.source) && idSet.has(e.target)) {
      succs[e.source].push(e.target);
      inDeg[e.target]++;
    }
  });
  const depth = {};
  const queue = nodes.filter(n => inDeg[n.id] === 0).map(n => n.id);
  queue.forEach(id => { depth[id] = 0; });
  const visited = new Set(queue);
  while (queue.length > 0) {
    const id = queue.shift();
    succs[id].forEach(sid => {
      depth[sid] = Math.max(depth[sid] || 0, (depth[id] || 0) + 1);
      inDeg[sid]--;
      if (inDeg[sid] === 0 && !visited.has(sid)) { queue.push(sid); visited.add(sid); }
    });
  }
  const byDepth = {};
  nodes.forEach(n => {
    const d = depth[n.id] || 0;
    if (!byDepth[d]) byDepth[d] = [];
    byDepth[d].push(n);
  });
  const NW = 190, NH = 96, CGAP = 60, RGAP = 14;
  nodes.forEach(n => {
    const d = depth[n.id] || 0;
    const col = byDepth[d];
    const idx = col.indexOf(n);
    const colH = col.length * (NH + RGAP) - RGAP;
    n.gx = d * (NW + CGAP);
    n.gy = idx * (NH + RGAP);
    n._colH = colH;
    n._depth = d;
  });
  // Center columns vertically
  const colHeights = {};
  Object.entries(byDepth).forEach(([d, col]) => {
    colHeights[d] = col.length * (NH + RGAP) - RGAP;
  });
  const maxH = Math.max(...Object.values(colHeights));
  nodes.forEach(n => {
    n.gy += (maxH - (colHeights[n._depth] || 0)) / 2;
  });
}

function renderNW() {
  const tasks = state.tasks;
  const regularTasks = tasks.filter(t => !t.isSummary && t.active !== 'いいえ');

  let modeTasks;
  if (state.nwMode === 'cp') {
    modeTasks = regularTasks.filter(t => t.critical === 'はい');
  } else if (state.nwMode === 'sub' && state.nwSelectedId) {
    const depth = state.nwSubDepth || 2;
    const selected = new Set([state.nwSelectedId]);
    const allEdges = [];
    regularTasks.forEach(t => {
      if (!t.pred) return;
      t.pred.split(',').map(s => parseInt(s.trim())).forEach(pid => {
        allEdges.push({source: pid, target: t.id});
      });
    });
    for (let i = 0; i < depth; i++) {
      const toAdd = new Set();
      allEdges.forEach(e => {
        if (selected.has(e.source)) toAdd.add(e.target);
        if (selected.has(e.target)) toAdd.add(e.source);
      });
      toAdd.forEach(id => selected.add(id));
    }
    modeTasks = regularTasks.filter(t => selected.has(t.id));
  } else {
    modeTasks = regularTasks.slice();
  }

  // Dept filter
  if (state.nwDeptFilter && state.nwDeptFilter !== 'all') {
    modeTasks = modeTasks.filter(t => (t.resource || '').includes(state.nwDeptFilter));
  }

  const {nodes, edges} = buildGraph(modeTasks);
  computeLayout(nodes, edges);

  const NW = 190, NH = 96;
  const maxX = nodes.length ? Math.max(...nodes.map(n => n.gx)) + NW + 40 : 400;
  const maxY = nodes.length ? Math.max(...nodes.map(n => n.gy)) + NH + 40 : 300;
  const CANVAS_W = Math.max(maxX + 60, 600);
  const CANVAS_H = Math.max(maxY + 60, 400);

  const deptOptions = ['all', ...DEPTS].map(d =>
    `<option value="${d}" ${state.nwDeptFilter === d ? 'selected' : ''}>${d === 'all' ? '全部門' : d}</option>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div class="nw-controls" style="margin-bottom:10px">
      <button class="btn btn-sm ${state.nwMode==='cp'?'btn-primary':'btn-outline'}" onclick="setNWMode('cp')">CPモード</button>
      <button class="btn btn-sm ${state.nwMode==='all'?'btn-primary':'btn-outline'}" onclick="setNWMode('all')">全体モード</button>
      <button class="btn btn-sm ${state.nwMode==='sub'?'btn-primary':'btn-outline'}" onclick="setNWMode('sub')">サブグラフ</button>
      ${state.nwMode==='sub'?`<label style="font-size:11px">深さ: <input type="number" min="1" max="5" value="${state.nwSubDepth}" style="width:44px;border:1px solid #ccc;border-radius:4px;padding:2px 4px" onchange="state.nwSubDepth=+this.value;renderNW()"></label>`:''}
      <select style="border:1px solid #ccc;border-radius:4px;padding:3px 6px;font-size:11px" onchange="state.nwDeptFilter=this.value;renderNW()">${deptOptions}</select>
      <button class="btn btn-sm btn-outline" onclick="resetNWZoom()">ズームリセット</button>
      <span class="text-muted">${nodes.length}ノード表示中</span>
    </div>
    <div id="nw-wrap">
      <div id="nw-svg-container" style="height:560px">
        <svg id="nw-svg"></svg>
      </div>
      <div id="nw-panel">
        <h3>タスク詳細</h3>
        <div id="nw-detail"><p class="text-muted" style="font-size:11px">ノードをクリックして詳細を表示</p></div>
      </div>
    </div>`;

  const svgEl = document.getElementById('nw-svg');
  const containerEl = document.getElementById('nw-svg-container');
  const cW = containerEl.clientWidth;
  const cH = containerEl.clientHeight;

  const svg = d3.select('#nw-svg').attr('width', cW).attr('height', cH);
  svg.selectAll('*').remove();

  const defs = svg.append('defs');
  // Arrow markers
  ['normal','cp'].forEach(type => {
    defs.append('marker').attr('id', `arrow-${type}`)
      .attr('viewBox', '0 -5 10 10').attr('refX', 10).attr('refY', 0)
      .attr('markerWidth', 6).attr('markerHeight', 6).attr('orient', 'auto')
      .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', type === 'cp' ? '#e53935' : '#4472C4');
  });

  const g = svg.append('g').attr('id', 'nw-g');

  // Edges
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  edges.forEach(e => {
    const src = nodeMap[e.source], tgt = nodeMap[e.target];
    if (!src || !tgt) return;
    const isCP = src.critical === 'はい' && tgt.critical === 'はい';
    const sx = src.gx + NW, sy = src.gy + NH / 2;
    const tx = tgt.gx, ty = tgt.gy + NH / 2;
    const cx = (sx + tx) / 2;
    g.append('path')
      .attr('d', `M${sx},${sy} C${cx},${sy} ${cx},${ty} ${tx},${ty}`)
      .attr('fill', 'none')
      .attr('stroke', isCP ? '#e53935' : '#4472C4')
      .attr('stroke-width', isCP ? 2.5 : 1.5)
      .attr('marker-end', `url(#arrow-${isCP ? 'cp' : 'normal'})`)
      .attr('opacity', .8);
  });

  // Nodes
  nodes.forEach(n => {
    const isClose = n.status === 'Close';
    const statusBgColor = isClose ? '#D9D9D9' : ({
      'On-going': '#E2EFDA', 'Delay': '#FFE0E0',
      'nActive': '#F2F2F2', 'Disable': '#F2F2F2'
    }[n.status] || '#fff');
    const statusBorderColor = isClose ? '#AAAAAA' : ({
      'On-going': '#00B050', 'Delay': '#FF0000',
      'nActive': '#808080', 'Disable': '#BFBFBF'
    }[n.status] || '#ccc');
    const isCP = !isClose && n.critical === 'はい';
    const isSelected = n.id === state.nwSelectedId;
    const textColor = isClose ? '#888888' : '#222';

    const ng = g.append('g').attr('class', 'nw-node')
      .attr('transform', `translate(${n.gx + 20},${n.gy + 20})`)
      .style('cursor', 'pointer')
      .on('click', () => selectNWNode(n.id))
      .on('dblclick', (e) => { e.stopPropagation(); showNWSubPanel(n.id); })
      .on('contextmenu', (e) => { e.preventDefault(); showNWContextMenu(e, n.id); });

    ng.append('rect')
      .attr('width', NW).attr('height', NH)
      .attr('rx', 5)
      .attr('fill', statusBgColor)
      .attr('stroke', isSelected ? '#333' : isCP ? '#e53935' : statusBorderColor)
      .attr('stroke-width', isSelected ? 3 : isCP ? 2.5 : 1.5);

    // CP badge (only for non-Close tasks)
    if (isCP) {
      ng.append('rect').attr('x', NW - 28).attr('y', 0).attr('width', 22).attr('height', 14)
        .attr('rx', 2).attr('fill', '#e53935');
      ng.append('text').attr('x', NW - 17).attr('y', 10).attr('text-anchor', 'middle')
        .attr('font-size', '9px').attr('fill', '#fff').attr('font-weight', '700').text('CP');
    }

    // WBS number
    ng.append('text').attr('x', 8).attr('y', 13)
      .attr('font-size', '9px').attr('fill', isClose ? '#AAAAAA' : '#888').text(n.wbs);

    // Task name (wrap at ~22 chars)
    const name = n.name;
    const line1 = name.slice(0, 22);
    const line2 = name.length > 22 ? name.slice(22, 42) + (name.length > 42 ? '…' : '') : '';
    ng.append('text').attr('x', NW / 2).attr('y', line2 ? 28 : 34)
      .attr('text-anchor', 'middle').attr('font-size', '11px').attr('font-weight', '600')
      .attr('fill', textColor).text(line1);
    if (line2) {
      ng.append('text').attr('x', NW / 2).attr('y', 42)
        .attr('text-anchor', 'middle').attr('font-size', '11px').attr('fill', textColor).text(line2);
    }

    // Separator line
    ng.append('line').attr('x1', 6).attr('x2', NW - 6).attr('y1', 58).attr('y2', 58)
      .attr('stroke', isClose ? '#BBBBBB' : '#ddd').attr('stroke-width', 1);

    // Status + pct
    ng.append('text').attr('x', NW / 2).attr('y', 71)
      .attr('text-anchor', 'middle').attr('font-size', '10px').attr('fill', isClose ? '#888888' : '#555')
      .text(`${n.status} | ${n.pct}%`);

    // Resource (担当)
    const resLabel = (n.resource || '—').length > 22 ? (n.resource || '—').slice(0, 21) + '…' : (n.resource || '—');
    ng.append('text').attr('x', NW / 2).attr('y', 87)
      .attr('text-anchor', 'middle').attr('font-size', '10px').attr('fill', isClose ? '#AAAAAA' : '#4472C4')
      .text(`担当: ${resLabel}`);

    ng.on('mouseover', (e) => showTooltip(e, `<b>${n.name}</b><br>WBS: ${n.wbs}<br>担当: ${n.resource||'—'}<br>ステータス: ${n.status}<br>達成率: ${n.pct}%${isCP ? '<br>🔴 クリティカルパス' : ''}`))
      .on('mouseout', hideTooltip);
  });

  // Zoom/pan
  const zoom = d3.zoom()
    .scaleExtent([0.2, 3])
    .on('zoom', (event) => { g.attr('transform', event.transform); });
  svg.call(zoom);

  // Initial transform to center content
  if (nodes.length > 0) {
    const initScale = Math.min(1, (cW - 40) / (CANVAS_W + 40), (cH - 40) / (CANVAS_H + 40));
    svg.call(zoom.transform, d3.zoomIdentity.translate(20, 20).scale(initScale));
  }
  state._nwZoom = zoom;
  state._nwSvg = svg;
}

window.setNWMode = function(mode) { state.nwMode = mode; renderNW(); };

  if (state._nwSvg && state._nwZoom) {
    state._nwSvg.transition().duration(400).call(state._nwZoom.transform, d3.zoomIdentity.translate(20, 20));
  }
};

function drawNWSubPanel() {
  const id = state.nwSubPanelId;
  if (!id) return;
  const depth = state.nwSubPanelDepth || 2;
  const regularTasks = state.tasks.filter(t => !t.isSummary && t.active !== 'いいえ');
  const selected = new Set([id]);
  const allEdges = [];
  regularTasks.forEach(t => {
    if (!t.pred) return;
    t.pred.split(',').map(s => parseInt(s.trim())).forEach(pid => allEdges.push({source: pid, target: t.id}));
  });
  for (let i = 0; i < depth; i++) {
    const toAdd = new Set();
    allEdges.forEach(e => {
      if (selected.has(e.source)) toAdd.add(e.target);
      if (selected.has(e.target)) toAdd.add(e.source);
    });
    toAdd.forEach(tid => selected.add(tid));
  }
  const subTasks = regularTasks.filter(t => selected.has(t.id));
  const {nodes, edges} = buildGraph(subTasks);
  computeLayout(nodes, edges);

  const NW = 190, NH = 96;
  const containerEl = document.getElementById('nw-sub-svg-container');
  if (!containerEl) return;
  const cW = containerEl.clientWidth || 600;
  const cH = containerEl.clientHeight || 320;

  const svg = d3.select('#nw-sub-svg').attr('width', cW).attr('height', cH);
  svg.selectAll('*').remove();

  const defs = svg.append('defs');
  ['normal','cp'].forEach(type => {
    defs.append('marker').attr('id', `arrow-sub-${type}`)
      .attr('viewBox', '0 -5 10 10').attr('refX', 10).attr('refY', 0)
      .attr('markerWidth', 6).attr('markerHeight', 6).attr('orient', 'auto')
      .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', type === 'cp' ? '#e53935' : '#4472C4');
  });

  const g = svg.append('g').attr('id', 'nw-sub-g');

  // Edges
  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });
  edges.forEach(e => {
    const src = nodeMap[e.source], tgt = nodeMap[e.target];
    if (!src || !tgt) return;
    const isCP = src.critical === 'はい' && tgt.critical === 'はい';
    const sx = src.gx + NW, sy = src.gy + NH / 2;
    const tx = tgt.gx, ty = tgt.gy + NH / 2;
    const cx = (sx + tx) / 2;
    g.append('path')
      .attr('d', `M${sx},${sy} C${cx},${sy} ${cx},${ty} ${tx},${ty}`)
      .attr('fill', 'none').attr('stroke', isCP ? '#e53935' : '#4472C4')
      .attr('stroke-width', isCP ? 2.5 : 1.5)
      .attr('marker-end', `url(#arrow-sub-${isCP ? 'cp' : 'normal'})`)
      .attr('opacity', .8);
  });

  // Nodes
  nodes.forEach(n => {
    const isClose = n.status === 'Close';
    const bgColor = isClose ? '#D9D9D9' : ({'On-going':'#E2EFDA','Delay':'#FFE0E0','nActive':'#F2F2F2','Disable':'#F2F2F2'}[n.status] || '#fff');
    const borderColor = isClose ? '#AAAAAA' : ({'On-going':'#00B050','Delay':'#FF0000','nActive':'#808080','Disable':'#BFBFBF'}[n.status] || '#ccc');
    const isCP = !isClose && n.critical === 'はい';
    const isFocus = n.id === id;
    const textColor = isClose ? '#888888' : '#222';

    const ng = g.append('g').attr('class', 'nw-node')
      .attr('transform', `translate(${n.gx + 20},${n.gy + 20})`)
      .style('cursor', 'pointer')
      .on('click', () => { state.nwSubPanelId = n.id; state.nwSubPanelDepth = depth; document.getElementById('nw-sub-title').textContent = n.name; drawNWSubPanel(); });

    ng.append('rect').attr('width', NW).attr('height', NH).attr('rx', 5)
      .attr('fill', bgColor)
      .attr('stroke', isFocus ? '#ff9800' : isCP ? '#e53935' : borderColor)
      .attr('stroke-width', isFocus ? 3 : isCP ? 2.5 : 1.5);

    if (isCP) {
      ng.append('rect').attr('x', NW - 28).attr('y', 0).attr('width', 22).attr('height', 14)
        .attr('rx', 2).attr('fill', '#e53935');
      ng.append('text').attr('x', NW - 17).attr('y', 10).attr('text-anchor', 'middle')
        .attr('font-size', '9px').attr('fill', '#fff').attr('font-weight', '700').text('CP');
    }

    ng.append('text').attr('x', 8).attr('y', 13).attr('font-size', '9px')
      .attr('fill', isClose ? '#AAAAAA' : '#888').text(n.wbs);

    const line1 = n.name.slice(0, 22);
    const line2 = n.name.length > 22 ? n.name.slice(22, 42) + (n.name.length > 42 ? '…' : '') : '';
    ng.append('text').attr('x', NW / 2).attr('y', line2 ? 28 : 34)
      .attr('text-anchor', 'middle').attr('font-size', '11px').attr('font-weight', '600')
      .attr('fill', textColor).text(line1);
    if (line2) {
      ng.append('text').attr('x', NW / 2).attr('y', 42)
        .attr('text-anchor', 'middle').attr('font-size', '11px').attr('fill', textColor).text(line2);
    }

    ng.append('line').attr('x1', 6).attr('x2', NW - 6).attr('y1', 58).attr('y2', 58)
      .attr('stroke', isClose ? '#BBBBBB' : '#ddd').attr('stroke-width', 1);

    ng.append('text').attr('x', NW / 2).attr('y', 71)
      .attr('text-anchor', 'middle').attr('font-size', '10px')
      .attr('fill', isClose ? '#888888' : '#555').text(`${n.status} | ${n.pct}%`);

    const resLabel = (n.resource || '—').length > 22 ? (n.resource || '—').slice(0, 21) + '…' : (n.resource || '—');
    ng.append('text').attr('x', NW / 2).attr('y', 87)
      .attr('text-anchor', 'middle').attr('font-size', '10px')
      .attr('fill', isClose ? '#AAAAAA' : '#4472C4').text(`担当: ${resLabel}`);

    ng.on('mouseover', (e) => showTooltip(e, `<b>${n.name}</b><br>担当: ${n.resource||'—'}<br>ステータス: ${n.status}<br>達成率: ${n.pct}%`))
      .on('mouseout', hideTooltip);
  });

  // Zoom/pan
  const zoom = d3.zoom().scaleExtent([0.2, 3])
    .on('zoom', (event) => { g.attr('transform', event.transform); });
  svg.call(zoom);

  if (nodes.length > 0) {
    const maxX = Math.max(...nodes.map(n => n.gx)) + NW + 60;
    const maxY = Math.max(...nodes.map(n => n.gy)) + NH + 60;
    const initScale = Math.min(1, (cW - 40) / maxX, (cH - 40) / maxY);
    svg.call(zoom.transform, d3.zoomIdentity.translate(20, 20).scale(initScale));
  }
}

        <span style="flex:1"></span>

          <span style="display:inline-block;width:12px;height:6px;background:#4472C4;border-radius:1px;opacity:.8;vertical-align:middle;margin-right:3px"></span>基準計画
          <span style="display:inline-block;width:12px;height:6px;background:#70AD47;border-radius:1px;opacity:.9;vertical-align:middle;margin-right:3px"></span>実績
        </span>
      </div>
      <div id="gantt-wrap"></div>
    </div>`;
  drawGantt();
}

window.setGanttWeeks = function(w) { state.ganttWeeks = w; renderGantt(); };

function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d;
}

function getWeekKey(dateStr) {
  const d = toDate(dateStr);
  if (!d) return '';
  const start = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayOfWeek = start.getUTCDay() || 7;
  start.setUTCDate(start.getUTCDate() + 4 - dayOfWeek);
  const yearStart = new Date(Date.UTC(start.getUTCFullYear(), 0, 1));
  const weekNum = Math.ceil((((start - yearStart) / 86400000) + 1) / 7);
  return `${start.getUTCFullYear()}-W${String(weekNum).padStart(2,'0')}`;
}

function drawGantt() {
  const wrap = document.getElementById('gantt-wrap');
  if (!wrap) return;
  const rd = toDate(state.reportDate);
  const monday = getMonday(rd);
  const weeks = state.ganttWeeks;
  const startWeek = new Date(monday.getTime() - Math.floor(weeks * 0.3) * 7 * 86400000);

  // Generate week headers
  const weekDates = [];
  for (let i = 0; i < weeks; i++) {
    const w = new Date(startWeek.getTime() + i * 7 * 86400000);
    weekDates.push(w);
  }

  // Group weeks by month for header
  const monthGroups = [];
  let curMonth = null, curStart = 0;
  weekDates.forEach((w, i) => {
    const m = `${w.getFullYear()}/${String(w.getMonth() + 1).padStart(2,'0')}`;
    if (m !== curMonth) {
      if (curMonth !== null) monthGroups.push({label: curMonth, count: i - curStart});
      curMonth = m;
      curStart = i;
    }
  });
  if (curMonth) monthGroups.push({label: curMonth, count: weekDates.length - curStart});

  // Fixed columns
  let fixedCols = [
    {key:'wbs',label:'WBS',w:70},{key:'name',label:'タスク名',w:200},{key:'resource',label:'担当',w:80},
    {key:'pct',label:'達成率',w:65},{key:'status',label:'ステータス',w:70},{key:'nw',label:'NW',w:28}
  ];

  // Visible tasks (apply collapse)
  const visibleTasks = [];
  const hiddenParents = new Set();
  state.tasks.forEach(t => {
    // Check if any parent is collapsed
    const parentWbs = t.wbs.split('.').slice(0, -1).join('.');
    const isHidden = [...hiddenParents].some(hw => t.wbs.startsWith(hw + '.'));
    if (!isHidden) {
      visibleTasks.push(t);
      if (t.isSummary && state.collapsedRows.has(t.id)) {
        hiddenParents.add(t.wbs);
      }
    }
  });

  // Apply saved column order
  const _ganttColOrder = JSON.parse(localStorage.getItem('pj_column_order_gantt') || 'null');
  if (_ganttColOrder && _ganttColOrder.length === fixedCols.length) {
    fixedCols = _ganttColOrder.map(k => fixedCols.find(c => c.key === k)).filter(Boolean);
    if (fixedCols.length !== _ganttColOrder.length) fixedCols = [{key:'wbs',label:'WBS'},{key:'name',label:'タスク名'},{key:'resource',label:'担当'},{key:'pct',label:'達成率'},{key:'status',label:'ステータス'},{key:'nw',label:'NW'}];
  }

  let html = '<table class="gantt-table"><thead>';
  // Month row
  html += '<tr>';
  fixedCols.forEach(c => html += `<th class="gt-cell" data-col-key="${c.key}" style="white-space:nowrap" rowspan="2">${c.label}</th>`);
  monthGroups.forEach(mg => html += `<th class="gt-month" colspan="${mg.count}">${mg.label}</th>`);
  html += '</tr>';
  // Week row
  html += '<tr>';
  weekDates.forEach(w => {
    const isToday = w <= rd && new Date(w.getTime() + 6 * 86400000) >= rd;
    html += `<th class="gt-header${isToday?' today-col':''}" style="min-width:22px;width:22px">${w.getDate()}</th>`;
  });
  html += '</tr></thead><tbody>';

  visibleTasks.forEach(task => {
    const isCP = task.critical === 'はい' && !task.isSummary;
    const isSummary = task.isSummary;
    const isCollapsed = state.collapsedRows.has(task.id);
    const indent = task.level === 1 ? 'il1' : task.level === 2 ? 'il2' : task.level === 3 ? 'il3' : 'il4';
    const rowBg = '';

    html += `<tr class="${isCP ? 'cp-row' : ''}${isSummary ? ' gantt-summary-row' : ''}">`;
    fixedCols.forEach(c => {
      let val = '';
      if (c.key === 'wbs') val = `<span style="font-size:10px;color:#888">${task.wbs}</span>`;
      else if (c.key === 'name') {
        const toggle = isSummary ? `<span style="cursor:pointer;margin-right:4px;color:#4472C4" onclick="toggleGanttRow(${task.id})">${isCollapsed?'▶':'▼'}</span>` : '<span style="display:inline-block;width:18px"></span>';
        val = `<div class="${indent}" style="white-space:nowrap;overflow:hidden;max-width:180px;text-overflow:ellipsis">${toggle}${task.name}</div>`;
      }
      else if (c.key === 'resource') val = `<span style="font-size:10px;color:#888">${task.resource||''}</span>`;
      else if (c.key === 'pct') val = `${pctBar(task.pct)}`;
      else if (c.key === 'status') val = statusBadge(task.status);
      else if (c.key === 'nw') val = `<span class="nw-icon" onclick="jumpToNW(${task.id})">🔗</span>`;
      const stickyStyle = ['wbs','name','resource','pct','status','nw'].includes(c.key) ?
        'position:sticky;left:0;z-index:1;' : '';
      html += `<td class="gt-cell" style="${stickyStyle}white-space:nowrap">${val}</td>`;
    });

    const bstart = toDate(task.bstart), bend = toDate(task.bend);
    const astart = toDate(task.astart), aend = toDate(task.aend);
    const today = toDate(state.reportDate);

    weekDates.forEach(w => {
      const wEnd = new Date(w.getTime() + 6 * 86400000);
      const isToday = w <= today && wEnd >= today;
      const bg = '';
      const todayClass = isToday ? ' today-bg' : '';

      // Check overlaps
      const baseOverlap = bstart && bend && bstart <= wEnd && bend >= w;
      const actualOverlap = astart && (aend || today) && astart <= wEnd && (aend || today) >= w;

      let cellContent = '<div style="position:relative;height:22px">';
      if (baseOverlap) {
        // Calculate left% and width% within the week
        const clampedStart = Math.max(bstart, w);
        const clampedEnd = Math.min(bend, wEnd);
        const weekMs = 7 * 86400000;
        const leftPct = (clampedStart - w) / weekMs * 100;
        const widPct = (clampedEnd - clampedStart) / weekMs * 100;
        const color = isSummary ? '#2F5597' : '#4472C4';
        cellContent += `<div class="gantt-bar-base" style="left:${leftPct}%;width:${widPct}%;background:${color}"></div>`;
      }
      if (actualOverlap) {
        const effectiveEnd = aend || today;
        const clampedStart = Math.max(astart, w);
        const clampedEnd = Math.min(effectiveEnd, wEnd);
        const weekMs = 7 * 86400000;
        const leftPct = (clampedStart - w) / weekMs * 100;
        const widPct = (clampedEnd - clampedStart) / weekMs * 100;
        cellContent += `<div class="gantt-bar-actual" style="left:${leftPct}%;width:${widPct}%"></div>`;
      }
      cellContent += '</div>';
      html += `<td class="gantt-bar-cell${todayClass}">${cellContent}</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
  enhanceGanttTable(wrap);
}

window.toggleGanttRow = function(id) {
  if (state.collapsedRows.has(id)) state.collapsedRows.delete(id);
  else state.collapsedRows.add(id);
  drawGantt();
};

        </div>
        <button class="btn btn-sm" style="background:#fef;border:1px solid #fcc;font-size:11px" onclick="deleteAction(${i})">削除</button>
      </div>`).join('')}
    </div>`;

  const _mtgHtml = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

    if (tbl.querySelector('tbody')) enhanceTable(tbl, 'meeting_' + i);
  });
}

// =====================================================================
// COLUMN ENHANCE: RESIZE + FILTER + REORDER
// =====================================================================
function enhanceTable(tableEl, screenId) {
  if (!tableEl) return;
  applyColReorder(tableEl, screenId);
  applyColResize(tableEl, screenId);
  applyColFilter(tableEl, screenId);
}

// --- Column Resize (auto-fit on first load) ---
function applyColResize(tableEl, screenId) {
  const key = 'pj_column_widths_' + screenId;
  const saved = JSON.parse(localStorage.getItem(key) || '{}');
  const hasSaved = Object.keys(saved).length > 0;
  const thead = tableEl.querySelector('thead');
  if (!thead) return;
  const headerRow = thead.querySelector('tr:last-child') || thead.querySelector('tr');
  if (!headerRow) return;
  const ths = [...headerRow.cells];
  ths.forEach((th, i) => {
    th.style.position = 'relative';
    if (hasSaved && saved[i]) { th.style.width = saved[i]; th.style.minWidth = saved[i]; }
    th.querySelectorAll('.col-resizer').forEach(r => r.remove());
    const handle = document.createElement('div');
    handle.className = 'col-resizer';
    handle.setAttribute('draggable', 'false');
    th.appendChild(handle);
    handle.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      handle.classList.add('resizing');
      const startX = e.clientX, startW = th.offsetWidth;
      const onMove = (ev) => { const w = Math.max(30, startW + ev.clientX - startX); th.style.width = w + 'px'; th.style.minWidth = w + 'px'; };
      const onUp = () => {
        handle.classList.remove('resizing');
        const ws = {}; ths.forEach((t, idx) => { ws[idx] = t.offsetWidth + 'px'; });
        localStorage.setItem(key, JSON.stringify(ws));
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
  // Save browser auto-sized widths on first load
  if (!hasSaved) {
    requestAnimationFrame(() => {
      const ws = {};
      ths.forEach((t, idx) => { if (t.offsetWidth > 0) ws[idx] = t.offsetWidth + 'px'; });
      if (Object.keys(ws).length > 0) localStorage.setItem(key, JSON.stringify(ws));
    });
  }
}

// --- Column Filter ---
function applyColFilter(tableEl, screenId) {
  const key = 'pj_filters_' + screenId;
  const savedFilters = JSON.parse(localStorage.getItem(key) || '{}');
  const thead = tableEl.querySelector('thead');
  const tbody = tableEl.querySelector('tbody');
  if (!thead || !tbody) return;
  const headerRow = thead.querySelector('tr:last-child') || thead.querySelector('tr');
  if (!headerRow) return;
  const ths = [...headerRow.cells];
  const trs = [...tbody.querySelectorAll('tr')];

  function applyAllFilters() {
    trs.forEach(tr => {
      let visible = true;
      Object.entries(savedFilters).forEach(([ci, allowed]) => {
        if (!allowed) return;
        const td = tr.cells[parseInt(ci)];
        const val = td ? td.textContent.trim() : '';
        if (!allowed.includes(val)) visible = false;
      });
      tr.style.display = visible ? '' : 'none';
    });
    localStorage.setItem(key, JSON.stringify(savedFilters));
  }
  applyAllFilters();

  ths.forEach((th, colIdx) => {
    th.querySelectorAll('.filter-btn').forEach(b => b.remove());
    const vals = [...new Set(trs.map(tr => { const td = tr.cells[colIdx]; return td ? td.textContent.trim() : ''; }).filter(v => v))];
    if (vals.length === 0) return;

    const btn = document.createElement('span');
    btn.className = 'filter-btn' + (savedFilters[colIdx] ? ' active' : '');
    btn.textContent = '▼';
    btn.title = 'フィルター';
    th.appendChild(btn);

    btn.addEventListener('click', (e) => {
      e.stopPropagation(); e.preventDefault();
      document.querySelectorAll('.col-filter-dropdown').forEach(d => d.remove());
      const selected = savedFilters[colIdx] || vals;
      const dd = document.createElement('div');
      dd.className = 'col-filter-dropdown';

      const allWrap = document.createElement('div');
      allWrap.style.cssText = 'padding:4px 0;border-bottom:1px solid #eee;margin-bottom:6px;font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer;';
      const allCb = document.createElement('input');
      allCb.type = 'checkbox'; allCb.checked = !savedFilters[colIdx];
      allWrap.appendChild(allCb);
      allWrap.appendChild(document.createTextNode('すべて選択'));
      dd.appendChild(allWrap);

      const itemCbs = [];
      vals.forEach(val => {
        const lbl = document.createElement('label');
        lbl.style.cssText = 'display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer;';
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.value = val; cb.checked = selected.includes(val);
        lbl.appendChild(cb);
        lbl.appendChild(document.createTextNode(val));
        dd.appendChild(lbl);
        itemCbs.push(cb);
        cb.addEventListener('change', () => {
          const checked = itemCbs.filter(c => c.checked).map(c => c.value);
          savedFilters[colIdx] = checked.length === vals.length ? null : checked;
          allCb.checked = !savedFilters[colIdx];
          btn.classList.toggle('active', !!savedFilters[colIdx]);
          applyAllFilters();
        });
      });
      allCb.addEventListener('change', () => {
        savedFilters[colIdx] = allCb.checked ? null : [];
        itemCbs.forEach(c => c.checked = allCb.checked);
        btn.classList.toggle('active', !!savedFilters[colIdx]);
        applyAllFilters();
      });

      const rect = btn.getBoundingClientRect();
      dd.style.left = rect.left + 'px';
      dd.style.top = (rect.bottom + 2) + 'px';
      document.body.appendChild(dd);
      setTimeout(() => {
        document.addEventListener('click', function closeDD(ev) {
          if (!dd.contains(ev.target)) { dd.remove(); document.removeEventListener('click', closeDD); }
        });
      }, 0);
    });
  });
}

// --- Column Reorder (data-col-orig tracking for stable multi-drag) ---
function applyColReorder(tableEl, screenId) {
  const key = 'pj_column_order_' + screenId;
  const thead = tableEl.querySelector('thead');
  if (!thead) return;
  const headerRow = thead.querySelector('tr:last-child') || thead.querySelector('tr');
  if (!headerRow) return;

  // Stamp original indices on th and matching td cells (idempotent)
  const origThs = [...headerRow.cells];
  origThs.forEach((th, i) => {
    if (!th.hasAttribute('data-col-orig')) {
      th.setAttribute('data-col-orig', i);
      tableEl.querySelectorAll('tbody tr').forEach(row => {
        if (row.cells[i]) row.cells[i].setAttribute('data-col-orig', i);
      });
    }
  });

  const savedOrder = JSON.parse(localStorage.getItem(key) || 'null');
  if (savedOrder && savedOrder.length === origThs.length) {
    _applyColOrderByOrig(tableEl, savedOrder);
  }

  const ths = [...headerRow.cells];
  ths.forEach((th) => {
    th.setAttribute('draggable', 'true');
    th.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', th.getAttribute('data-col-orig'));
      e.dataTransfer.effectAllowed = 'move';
      requestAnimationFrame(() => th.style.opacity = '0.4');
    });
    th.addEventListener('dragend', () => {
      th.style.opacity = '';
      ths.forEach(t => t.classList.remove('drag-over'));
    });
    th.addEventListener('dragover', (e) => {
      e.preventDefault();
      ths.forEach(t => t.classList.remove('drag-over'));
      th.classList.add('drag-over');
    });
    th.addEventListener('dragleave', () => th.classList.remove('drag-over'));
    th.addEventListener('drop', (e) => {
      e.preventDefault(); th.classList.remove('drag-over');
      const srcOrig = parseInt(e.dataTransfer.getData('text/plain'));
      const tgtOrig = parseInt(th.getAttribute('data-col-orig'));
      if (isNaN(srcOrig) || isNaN(tgtOrig) || srcOrig === tgtOrig) return;
      const currentOrder = [...headerRow.cells].map(t => parseInt(t.getAttribute('data-col-orig')));
      const srcVI = currentOrder.indexOf(srcOrig);
      const tgtVI = currentOrder.indexOf(tgtOrig);
      if (srcVI === -1 || tgtVI === -1) return;
      const newOrder = [...currentOrder];
      newOrder.splice(tgtVI, 0, newOrder.splice(srcVI, 1)[0]);
      _applyColOrderByOrig(tableEl, newOrder);
      localStorage.setItem(key, JSON.stringify(newOrder));
      applyColResize(tableEl, screenId);
      applyColFilter(tableEl, screenId);
    });
  });
}

function _applyColOrderByOrig(tableEl, orderByOrig) {
  tableEl.querySelectorAll('tr').forEach(row => {
    const cells = [...row.cells];
    const origMap = {};
    cells.forEach(cell => {
      const o = cell.getAttribute('data-col-orig');
      if (o !== null) origMap[parseInt(o)] = cell;
    });
    if (Object.keys(origMap).length === 0) {
      if (cells.length !== orderByOrig.length) return;
      orderByOrig.forEach(origIdx => row.appendChild(cells[origIdx]));
    } else {
      orderByOrig.forEach(origIdx => { if (origMap[origIdx] !== undefined) row.appendChild(origMap[origIdx]); });
    }
  });
}

// --- Gantt-specific enhance (fixed columns only) ---
function enhanceGanttTable(wrap) {
  const table = wrap.querySelector('table');
  if (!table) return;
  const thead = table.querySelector('thead');
  if (!thead) return;
  const firstRow = thead.querySelector('tr:first-child');
  if (!firstRow) return;
  const fixedThs = [...firstRow.cells].filter(th => th.rowSpan >= 2);
  if (fixedThs.length === 0) return;

  // Resize
  const resizeKey = 'pj_column_widths_gantt';
  const savedW = JSON.parse(localStorage.getItem(resizeKey) || '{}');
  const hasSavedW = Object.keys(savedW).length > 0;
  fixedThs.forEach((th, i) => {
    th.style.position = 'relative';
    if (hasSavedW && savedW[i]) { th.style.width = savedW[i]; th.style.minWidth = savedW[i]; }
    th.querySelectorAll('.col-resizer').forEach(r => r.remove());
    const handle = document.createElement('div');
    handle.className = 'col-resizer'; handle.setAttribute('draggable', 'false');
    th.appendChild(handle);
    handle.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      handle.classList.add('resizing');
      const startX = e.clientX, startW = th.offsetWidth;
      const onMove = (ev) => { const w = Math.max(30, startW + ev.clientX - startX); th.style.width = w + 'px'; th.style.minWidth = w + 'px'; };
      const onUp = () => {
        handle.classList.remove('resizing');
        const ws = {}; fixedThs.forEach((t, idx) => { ws[idx] = t.offsetWidth + 'px'; });
        localStorage.setItem(resizeKey, JSON.stringify(ws));
        document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
    });
  });
  if (!hasSavedW) {
    requestAnimationFrame(() => {
      const ws = {}; fixedThs.forEach((t, i) => { if (t.offsetWidth > 0) ws[i] = t.offsetWidth + 'px'; });
      if (Object.keys(ws).length > 0) localStorage.setItem(resizeKey, JSON.stringify(ws));
    });
  }

  // Filter (fixed columns only)
  const filterKey = 'pj_filters_gantt';
  const savedF = JSON.parse(localStorage.getItem(filterKey) || '{}');
  const trs = [...table.querySelectorAll('tbody tr')];
  function applyGanttFilter() {
    trs.forEach(tr => {
      let visible = true;
      Object.entries(savedF).forEach(([ci, allowed]) => {
        if (!allowed) return;
        const td = tr.cells[parseInt(ci)];
        const val = td ? td.textContent.trim() : '';
        if (!allowed.includes(val)) visible = false;
      });
      tr.style.display = visible ? '' : 'none';
    });
    localStorage.setItem(filterKey, JSON.stringify(savedF));
  }
  applyGanttFilter();
  fixedThs.forEach((th, colIdx) => {
    th.querySelectorAll('.filter-btn').forEach(b => b.remove());
    const vals = [...new Set(trs.map(tr => { const td = tr.cells[colIdx]; return td ? td.textContent.trim() : ''; }).filter(v => v))];
    if (vals.length === 0) return;
    const btn = document.createElement('span');
    btn.className = 'filter-btn' + (savedF[colIdx] ? ' active' : '');
    btn.textContent = '▼'; btn.title = 'フィルター'; th.appendChild(btn);
    btn.addEventListener('click', (e) => {
      e.stopPropagation(); e.preventDefault();
      document.querySelectorAll('.col-filter-dropdown').forEach(d => d.remove());
      const selected = savedF[colIdx] || vals;
      const dd = document.createElement('div'); dd.className = 'col-filter-dropdown';
      const allWrap = document.createElement('div');
      allWrap.style.cssText = 'padding:4px 0;border-bottom:1px solid #eee;margin-bottom:6px;font-weight:600;display:flex;align-items:center;gap:6px;';
      const allCb = document.createElement('input'); allCb.type = 'checkbox'; allCb.checked = !savedF[colIdx];
      allWrap.appendChild(allCb); allWrap.appendChild(document.createTextNode('すべて選択')); dd.appendChild(allWrap);
      const itemCbs = [];
      vals.forEach(val => {
        const lbl = document.createElement('label');
        lbl.style.cssText = 'display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer;';
        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = val; cb.checked = selected.includes(val);
        lbl.appendChild(cb); lbl.appendChild(document.createTextNode(val)); dd.appendChild(lbl); itemCbs.push(cb);
        cb.addEventListener('change', () => {
          const checked = itemCbs.filter(c => c.checked).map(c => c.value);
          savedF[colIdx] = checked.length === vals.length ? null : checked;
          allCb.checked = !savedF[colIdx]; btn.classList.toggle('active', !!savedF[colIdx]); applyGanttFilter();
        });
      });
      allCb.addEventListener('change', () => {
        savedF[colIdx] = allCb.checked ? null : [];
        itemCbs.forEach(c => c.checked = allCb.checked);
        btn.classList.toggle('active', !!savedF[colIdx]); applyGanttFilter();
      });
      const rect = btn.getBoundingClientRect();
      dd.style.left = rect.left + 'px'; dd.style.top = (rect.bottom + 2) + 'px';
      document.body.appendChild(dd);
      setTimeout(() => {
        document.addEventListener('click', function closeDD(ev) {
          if (!dd.contains(ev.target)) { dd.remove(); document.removeEventListener('click', closeDD); }
        });
      }, 0);
    });
  });

  // Reorder (save as key array, triggers re-render)
  const reorderKey = 'pj_column_order_gantt';
  fixedThs.forEach((th) => {
    th.setAttribute('draggable', 'true');
    th.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', th.getAttribute('data-col-key') || '');
      e.dataTransfer.effectAllowed = 'move';
      requestAnimationFrame(() => th.style.opacity = '0.4');
    });
    th.addEventListener('dragend', () => {
      th.style.opacity = ''; fixedThs.forEach(t => t.classList.remove('drag-over'));
    });
    th.addEventListener('dragover', (e) => {
      e.preventDefault(); fixedThs.forEach(t => t.classList.remove('drag-over')); th.classList.add('drag-over');
    });
    th.addEventListener('dragleave', () => th.classList.remove('drag-over'));
    th.addEventListener('drop', (e) => {
      e.preventDefault(); th.classList.remove('drag-over');
      const srcKey = e.dataTransfer.getData('text/plain');
      const tgtKey = th.getAttribute('data-col-key');
      if (!srcKey || !tgtKey || srcKey === tgtKey) return;
      const currentKeys = [...firstRow.cells].filter(t => t.rowSpan >= 2).map(t => t.getAttribute('data-col-key'));
      const srcVI = currentKeys.indexOf(srcKey);
      const tgtVI = currentKeys.indexOf(tgtKey);
      if (srcVI === -1 || tgtVI === -1) return;
      const newKeys = [...currentKeys];
      newKeys.splice(tgtVI, 0, newKeys.splice(srcVI, 1)[0]);
      localStorage.setItem(reorderKey, JSON.stringify(newKeys));
      drawGantt();
    });
  });
}
